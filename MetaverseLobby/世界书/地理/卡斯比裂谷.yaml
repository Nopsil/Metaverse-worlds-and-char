名称: 卡斯比裂谷
系列: 地上真人篇 / 乐园事变
类型: 禁忌领域

概述: 曾经旧人类时代的世界第一大湖，因环境污染和资源战争彻底枯竭。如今是深不见底的巨型裂谷，残留致命的污染毒素

地理特征:
  位置: 巴尔迪亚以北，卡拉玖殖民地位于其南端。大裂谷西部有一片沙漠地区
  地形: 如同被巨勺挖过的巨大坑洞与深谷，地形因真人-机械种的战争已发生剧烈变化，险峻难行
  污染: 原湖水中毒素已渗入土壤深处，坠入谷底者会在爬出前被毒害成不可名状的尸体

历史: 千百年来机械种和真人都鲜少涉足。现已有流离失所的机械种和真人流浪至此，内部状况无人知晓

战略意义: 拔示巴与机械种的大部队曾在此进行过大规模交战（古战场位置未明）。地形险要使其成为天然屏障和藏身之所
