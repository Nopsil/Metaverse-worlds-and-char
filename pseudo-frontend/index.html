<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaverse Lobby v0.4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --cyan: #00e5ff; --pink: #ff2d95; --gold: #ffd700;
  --white: #f0f0ff;
  --font-display: 'Noto Sans JP', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}

/* ===== CHUNITHM 街机背景 ===== */
.bg-layer{
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background:
    /* 顶部彩虹光晕 */
    radial-gradient(circle at 50% -10%, rgba(0,229,255,0.4) 0%, rgba(255,45,149,0.25) 30%, transparent 70%),
    /* 中央高光爆散 */
    radial-gradient(circle at 50% 35%, rgba(255,255,255,0.15) 0%, rgba(0,150,255,0.1) 40%, transparent 80%),
    /* 官方纹理叠加 */
    url('https://chunithm.sega.com/assets/img/common/bg/bg.jpg'),
    /* 通透的暗蓝到深紫渐变（不沉闷） */
    linear-gradient(180deg, #092040 0%, #0d122b 50%, #050714 100%);
  background-blend-mode: overlay, normal, soft-light, normal;
  background-size: cover, 100% 100%, cover, 100% 100%;
}
/* 城市剪影 —— 官方 verse_town 素材 */
.bg-layer::before{
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: url('https://chunithm.sega.com/assets/img/common/bg/verse_town_pc.png') bottom center/contain no-repeat;
  pointer-events: none;
  opacity: 0.5;
}
/* 彩虹极光扫过 */
.bg-layer::after{
  content: '';
  position: absolute;
  top: 0; left: -50%; width: 200%; height: 100%;
  background: linear-gradient(45deg,
    transparent 40%,
    rgba(0,229,255,0.1) 48%,
    rgba(255,45,149,0.15) 50%,
    rgba(255,215,0,0.1) 52%,
    transparent 60%);
  animation: auroraSweep 8s linear infinite;
  pointer-events: none;
}
@keyframes auroraSweep{
  0%{ transform: translateX(-30%) translateY(-10%) }
  100%{ transform: translateX(30%) translateY(10%) }
}

/* 中央 globe 装饰 */
.center-globe{
  position: fixed; z-index: 0; pointer-events: none;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 500px; height: 500px;
  background: url('https://chunithm.sega.com/assets/img/common/bg/globe_center.png') center/contain no-repeat;
  opacity: 0.08;
  animation: globeSpin 60s linear infinite;
}
@keyframes globeSpin{ to{ transform: translate(-50%,-50%) rotate(360deg) } }

/* ===== 模糊光斑 (Bokeh) ===== */
.bokeh{
  position: fixed; z-index: 1; pointer-events: none;
  border-radius: 50%;
  filter: blur(30px);
  animation: bokehFloat 6s ease-in-out infinite;
}
.bokeh-1{ top: 10%; left: 15%; width: 120px; height: 120px; background: rgba(0,229,255,0.08); animation-delay: 0s }
.bokeh-2{ top: 40%; right: 10%; width: 80px; height: 80px; background: rgba(255,45,149,0.06); animation-delay: 1.5s }
.bokeh-3{ top: 60%; left: 25%; width: 100px; height: 100px; background: rgba(255,215,0,0.04); animation-delay: 3s }
.bokeh-4{ top: 20%; right: 30%; width: 60px; height: 60px; background: rgba(255,255,255,0.04); animation-delay: 4.5s }
@keyframes bokehFloat{
  0%,100%{ transform: translateY(0) scale(1) }
  50%{ transform: translateY(-20px) scale(1.2) }
}

/* 高速光轨 */
.streak{
  position: fixed; z-index: 1; pointer-events: none;
  height: 2px; border-radius: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), rgba(255,255,255,0.7), rgba(0,229,255,0.5), transparent);
  animation: streakFly 5s linear infinite;
}
.streak-1{ top: 25%; width: 400px; animation-delay: 0s; transform: rotate(-12deg) }
.streak-2{ top: 55%; width: 300px; animation-delay: 2.5s; transform: rotate(-18deg); opacity: 0.6 }
.streak-3{ top: 75%; width: 250px; animation-delay: 4s; transform: rotate(-8deg); opacity: 0.4 }
@keyframes streakFly{
  0%{ left: -400px }
  100%{ left: 110% }
}

/* ===== 彩虹光条 ===== */
.rainbow-top{
  height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--cyan), var(--gold), var(--pink));
  box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,229,255,0.3);
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
}
.rainbow-bottom{
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--pink), var(--cyan), var(--gold));
  box-shadow: 0 0 8px var(--pink);
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
}

/* ===== 街机顶栏 ===== */
.arcade-bar{
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 24px; background: rgba(0,0,0,0.7);
  border-bottom: 2px solid var(--cyan);
  font-family: var(--font-display); font-weight: 900; font-style: italic;
  font-size: 12px; letter-spacing: 1px;
}
.arcade-user{ display: flex; align-items: center; gap: 8px }
.arcade-p1{
  background: var(--cyan); color: #000;
  padding: 1px 6px; font-size: 10px; font-weight: 900;
}
.arcade-name{ color: var(--white); opacity: 0.7 }
.arcade-rating{
  background: linear-gradient(90deg, var(--gold), #ff8c00);
  color: #000; padding: 2px 8px; font-size: 10px;
}
.arcade-rating b{ font-size: 13px }
.arcade-info{ color: var(--text-dim) }

/* ===== 标题 ===== */
.header{
  position: relative; z-index: 2;
  text-align: center; padding: 36px 20px 16px;
}
.header h1{
  font-size: 38px; font-weight: 900; font-style: italic; letter-spacing: 4px;
  background: linear-gradient(180deg, #fff 0%, var(--cyan) 55%, var(--pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(0,229,255,0.5));
}
.header .sub{ font-size: 12px; letter-spacing: 3px; color: var(--cyan); opacity: 0.8; margin-top: 4px }

/* ===== 角色卡片 ===== */
.char-row{
  position: relative; z-index: 2;
  display: flex; gap: 20px; justify-content: center; padding: 20px 20px 10px; flex-wrap: wrap;
}
.char-card{
  width: 180px;
  background: linear-gradient(170deg, rgba(12,18,38,0.9), rgba(8,12,28,0.95));
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
  cursor: pointer; transition: all 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
  position: relative; overflow: hidden;
  box-shadow: -4px 4px 15px rgba(0,0,0,0.5);
}
/* 霓虹边缘——box-shadow 不会被 clip-path 裁掉 */
.char-card::before{
  content: '';
  position: absolute; inset: 0;
  box-shadow: inset 0 0 0 1.5px rgba(0,229,255,0.2);
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 5;
}
.char-card::after{
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(170deg, rgba(0,229,255,0.12), transparent 60%);
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none;
}
.char-card:hover{ transform: translateY(-3px); box-shadow: -4px 4px 20px rgba(0,229,255,0.2) }
.char-card:hover::after{ opacity: 1 }
.char-card:hover::before{ box-shadow: inset 0 0 0 1.5px rgba(0,229,255,0.6) }
.char-card.selected{
  box-shadow: 0 0 25px rgba(0,229,255,0.5), 0 8px 24px rgba(0,0,0,0.5);
  background: linear-gradient(170deg, rgba(0,229,255,0.18), rgba(255,45,149,0.08));
}
.char-card.selected::before{ box-shadow: inset 0 0 0 2px var(--cyan), inset 0 0 20px rgba(0,229,255,0.2) }
.char-card.selected::after{ opacity: 1 }
.char-visual{
  height: 170px; position: relative;
  display: flex; align-items: flex-end; justify-content: center;
  font-size: 56px; padding-bottom: 8px;
}
.char-visual .rank-badge{
  position: absolute; top: 8px; left: 14px;
  background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,20,40,0.7));
  border: 1px solid rgba(255,215,0,0.4);
  padding: 2px 10px; font-size: 10px; font-weight: 900; font-style: italic;
  color: var(--gold); letter-spacing: 1px;
  clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
}
.char-visual .level-tag{
  position: absolute; bottom: 6px; right: 10px;
  font-size: 10px; font-weight: 900; font-style: italic;
  color: rgba(255,255,255,0.3); letter-spacing: 1px;
}
.char-info{
  padding: 10px 14px 14px;
  background: linear-gradient(0deg, rgba(0,0,0,0.4), transparent);
  position: relative;
}
.char-name{ font-size: 15px; font-weight: 700; font-style: italic; letter-spacing: 1px; color: var(--white) }
.char-epithet{ font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 1px }
.char-card.selected .char-info::after{
  content: ''; position: absolute; bottom: 0; left: 14px; right: 14px; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  box-shadow: 0 0 6px var(--cyan);
}

/* ===== 场景面板 ===== */
.scene-panel{
  position: relative; z-index: 2;
  display: none; max-width: 900px; margin: 8px auto; padding: 20px 24px;
}
.scene-panel.on{ display: block; animation: fadeUp 0.25s ease-out }
@keyframes fadeUp{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.scene-panel h2{
  font-size: 14px; font-weight: 700; font-style: italic; letter-spacing: 2px;
  color: var(--cyan); text-align: center; margin-bottom: 14px;
}
.scene-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px }
.scene-btn{
  background: linear-gradient(160deg, rgba(12,18,38,0.9), rgba(8,12,28,0.95));
  clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
  padding: 16px 14px; cursor: pointer; transition: all 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
  position: relative;
  box-shadow: -2px 2px 10px rgba(0,0,0,0.4);
}
.scene-btn::before{
  content: '';
  position: absolute; inset: 0;
  box-shadow: inset 0 0 0 1px rgba(0,229,255,0.15);
  clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
  transition: all 0.25s;
  pointer-events: none;
}
.scene-btn:hover{ transform: translateY(-2px); box-shadow: -2px 2px 14px rgba(0,229,255,0.2) }
.scene-btn:hover::before{ box-shadow: inset 0 0 0 1px rgba(0,229,255,0.5) }
.scene-btn.selected{
  background: linear-gradient(160deg, rgba(0,229,255,0.14), rgba(255,45,149,0.06));
  box-shadow: 0 0 18px rgba(0,229,255,0.3);
}
.scene-btn.selected::before{ box-shadow: inset 0 0 0 1.5px var(--cyan), inset 0 0 12px rgba(0,229,255,0.15) }
.st-top{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px }
.st-track-no{ font-size: 9px; font-weight: 900; font-style: italic; color: var(--text-dim); letter-spacing: 1px }
.st-level{ font-size: 9px; font-weight: 900; font-style: italic; padding: 1px 6px; letter-spacing: 1px }
.st-level.master{ background: rgba(155,89,182,0.2); color: #9b59b6; border: 1px solid rgba(155,89,182,0.3) }
.st-level.danger{ background: rgba(255,45,149,0.15); color: var(--pink); border: 1px solid rgba(255,45,149,0.3) }
.scene-btn .st-title{ font-size: 14px; font-weight: 700; font-style: italic; color: var(--white); margin-bottom: 3px }
.scene-btn .st-desc{ font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.4; margin-bottom: 6px }
.st-meta{ font-size: 9px; color: var(--text-dim); letter-spacing: 1px }

/* ===== 确认按钮 ===== */
.launch-wrap{
  position: relative; z-index: 2;
  display: none; justify-content: center; padding: 6px 0 40px;
}
.launch-wrap.on{ display: flex; animation: fadeUp 0.25s ease-out }
.launch-btn{
  font-size: 22px; font-weight: 900; font-style: italic; letter-spacing: 4px;
  padding: 16px 80px; border: none; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, var(--cyan), #0088c0 50%, var(--pink));
  clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
  box-shadow: 0 0 30px rgba(0,229,255,0.5), inset 0 0 20px rgba(255,255,255,0.2), 0 6px 20px rgba(0,0,0,0.4);
  transition: all 0.2s; position: relative; overflow: hidden;
}
.launch-btn::after{
  content: '';
  position: absolute; top: -50%; left: -60%; width: 40%; height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  transform: rotate(30deg);
  animation: btnShine 3s ease-in-out infinite;
}
@keyframes btnShine{ 0%{ left: -60% } 30%{ left: 140% } 100%{ left: 140% } }
.launch-btn:hover{ transform: scale(1.04); box-shadow: 0 0 50px rgba(0,229,255,0.7), inset 0 0 25px rgba(255,255,255,0.4), 0 8px 28px rgba(0,0,0,0.5) }
.launch-btn:active{ transform: scale(0.97) }

/* ===== 状态 ===== */
.status-bar{
  position: relative; z-index: 2;
  text-align: center; padding: 10px;
  font-size: 11px; font-style: italic; letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
}

@media(max-width:640px){
  .header h1{ font-size: 26px }
  .char-row{ gap: 12px }
  .char-card{ width: 140px }
  .char-visual{ height: 130px; font-size: 40px }
  .scene-grid{ grid-template-columns: 1fr 1fr }
}
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-layer"></div>
<div class="center-globe"></div>

<!-- 模糊光斑 + 高速光轨 -->
<div class="bokeh bokeh-1"></div>
<div class="bokeh bokeh-2"></div>
<div class="bokeh bokeh-3"></div>
<div class="bokeh bokeh-4"></div>
<div class="streak streak-1"></div>
<div class="streak streak-2"></div>
<div class="streak streak-3"></div>

<div class="rainbow-top"></div>
<div class="rainbow-bottom"></div>

<!-- 街机顶栏 -->
<div class="arcade-bar">
  <div class="arcade-user">
    <span class="arcade-p1">1P</span>
    <span class="arcade-name">USER</span>
    <span class="arcade-rating">RATING <b>15.25</b></span>
  </div>
  <div class="arcade-info">MAP: METAVERSE_01 ◆ TRACK SELECT</div>
</div>

<div class="header">
  <h1>METAVERSE LOBBY</h1>
  <div class="sub">◆ SELECT YOUR DESTINY ◆</div>
</div>

<div class="char-row" id="chars"></div>

<div class="scene-panel" id="scenes">
  <h2>◆ CHOOSE SCENARIO ◆</h2>
  <div class="scene-grid" id="scene-list"></div>
</div>

<div class="launch-wrap" id="confirm">
  <button class="launch-btn" onclick="launch()">GAME START</button>
</div>

<div class="status-bar" id="status"></div>

<script>
const chars = [
  {name:'艾莉尼', epithet:'Twilight Will', emoji:'🌌', rank:'Lv.??', color:'#7c8aff', scenarios:[
    {title:'漂流者与晨风', desc:'次元裂缝中与风之战士的偶然相遇——两个孤独旅人的轨迹在此交叠。', badge:''},
    {title:'次元裂缝', desc:'时空的裂隙扩大了。每一次跳跃都可能改变一切。', badge:''},
    {title:'外传·邂逅', desc:'在异世界中与威廉和安克擦肩。一段未曾被记录的旅程。', badge:''},
    {title:'乐园遗迹', desc:'废弃的乐园中隐藏着关于她世界的秘密。她不再是旁观者。', badge:''},
    {title:'NSFW', desc:'在乐园的深夜，记忆与触感从未如此清晰。', badge:'NSFW'}
  ]},
  {name:'拔示巴', epithet:'Ashidefill', emoji:'👑', rank:'Lv.??', color:'#ff4d4d', scenarios:[
    {title:'命运之子的王座', desc:'废墟王座上，崇拜者环绕。外来者的出现打破沉默的仪式。', badge:''},
    {title:'废土流浪者', desc:'她离开了圣堂。龟裂大地上两个流亡者的道路交叉了。', badge:''},
    {title:'圣堂反叛', desc:'当圣堂成为囚笼，拔示巴的耐心到了尽头。', badge:''},
    {title:'战斗联合', desc:'面对共同的敌人，她选择了暂时的联盟。不是信任——是实用。', badge:''},
    {title:'NSFW', desc:'约定的夜晚。她的王座不需要祈祷——只需要服从。', badge:'NSFW'}
  ]},
  {name:'蕾娜', epithet:'Ishmael', emoji:'🔫', rank:'Lv.??', color:'#ff8c42', scenarios:[
    {title:'逃亡者的选择', desc:'伊欧尼亚的废墟还在冒烟。11人死了——她是第12个。', badge:''},
    {title:'伊欧尼亚的幸存者', desc:'唯一的生还者。但"生还"从来不等同于"活着"。', badge:''},
    {title:'焦土独行', desc:'大地裂成碎片。她不再指望有人跟上她的脚步。', badge:''},
    {title:'共同的敌人', desc:'仇人的名单上两个名字重叠了。试一试——不是信任，是实用。', badge:''},
    {title:'NSFW', desc:'藏身处的夜晚。枪套没有解开——但有些事比扣扳机更需要勇气。', badge:'NSFW'}
  ]},
  {name:'米姆', epithet:'Mikura', emoji:'💜', rank:'Lv.??', color:'#9b59b6', scenarios:[
    {title:'光之塔的旅伴', desc:'新世界的入口，她站在你身边。"没有受伤也可以检查一下哦——免费的！"', badge:''},
    {title:'疗伤的巫女', desc:'蘑菇林边缘，她展开绷带和古老的医术。温柔得不属于这个废墟时代。', badge:''},
    {title:'异世界的导师', desc:'古老的知识需要传递者。她选择开口，选择信任。', badge:''},
    {title:'约定的尽头', desc:'泰斯塔蒙特睁开了眼。约定的代价即将清算。', badge:''},
    {title:'NSFW', desc:'月光透过光之塔的裂窗洒下。她说这只是"另一种对话"。', badge:'NSFW'}
  ]},
  {name:'贝尔泽布特', epithet:'Velzub', emoji:'🕷️', rank:'Lv.??', color:'#00e5ff', scenarios:[
    {title:'深渊的低语', desc:'纯数据构成的深渊中，一个声音呼唤你的名字。她不是敌人——但也不是朋友。', badge:''},
    {title:'猫戏老鼠', desc:'你被困在她的数据迷宫里。每条走廊都是死路——除非她让你通过。', badge:''},
    {title:'涅墨西斯会议', desc:'混沌七器的残存者会面了。旧日的誓言，今日的重量。', badge:''},
    {title:'程序觉醒', desc:'一段无法删除的代码。一个不该存在的自我意识。', badge:''},
    {title:'NSFW', desc:'一魂双体。今晚——触碰的会是谁？感知到触碰的又会是谁？', badge:'NSFW'}
  ]}
];
let selC=-1,selS=-1;
function renderChars(){
  document.getElementById('chars').innerHTML=chars.map((c,i)=>`
    <div class="char-card${i===selC?' selected':''}" onclick="pickChar(${i})">
      <div class="char-visual" style="background:radial-gradient(ellipse at 50% 120%, ${c.color}22 0%, transparent 60%)">
        <div class="rank-badge">${c.rank}</div><span>${c.emoji}</span>
        <div class="level-tag">LV.??</div>
      </div>
      <div class="char-info"><div class="char-name">${c.name}</div><div class="char-epithet">${c.epithet}</div></div>
    </div>`).join('');
}
function pickChar(i){selC=i;selS=-1;renderChars();renderScenes();$('scenes').classList.add('on');$('confirm').classList.remove('on');$('status').textContent=''}
function renderScenes(){
  $('scene-list').innerHTML=chars[selC].scenarios.map((s,j)=>{
    const nsfw=s.badge==='NSFW';
    return `
    <div class="scene-btn${j===selS?' selected':''}" onclick="pickScene(${j})">
      <div class="st-top">
        <span class="st-track-no">TRACK 0${j+1}</span>
        <span class="st-level ${nsfw?'danger':'master'}">${nsfw?'WORLD END':'LV.'+(12+j)+'+'}</span>
      </div>
      <div class="st-title">${s.title}</div>
      <div class="st-desc">${s.desc}</div>
      <div class="st-meta">${nsfw?'◆ NSFW SCENARIO':'BPM 180 ◆ RECORD: ALL JUSTICE'}</div>
    </div>`;
  }).join('');
}
function pickScene(j){selS=j;renderScenes();$('confirm').classList.add('on');$('status').textContent='◆ '+chars[selC].name+' · '+chars[selC].scenarios[j].title+' ◆'}
