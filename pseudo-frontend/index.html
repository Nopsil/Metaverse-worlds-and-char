<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaverse Lobby v0.3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --cyan: #00e5ff;
  --pink: #ff2d95;
  --gold: #ffd700;
  --white: #f0f0ff;
  --font-display: 'Noto Sans JP', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}

/* ===== 高亮渐变背景（CHUNITHM VERSE 天空城） ===== */
body{
  background:
    radial-gradient(ellipse at 60% 0%, #1a3a68 0%, transparent 50%),
    radial-gradient(ellipse at 40% 30%, #2a1050 0%, transparent 40%),
    radial-gradient(ellipse at 70% 70%, #102040 0%, transparent 50%),
    #020612;
  color: var(--white);
  font-family: var(--font-display);
  min-height: 100vh;
  overflow-x: hidden;
}
/* 彩虹光带 */
.rainbow-top{
  height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--cyan), var(--gold), var(--pink));
  box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,229,255,0.3);
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
}
.rainbow-bottom{
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--pink), var(--cyan), var(--gold));
  box-shadow: 0 0 8px var(--pink);
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
}

/* ===== 标题 ===== */
.header{
  text-align: center;
  padding: 32px 20px 16px;
  position: relative;
}
.header h1{
  font-size: 38px;
  font-weight: 900;
  font-style: italic;
  letter-spacing: 4px;
  background: linear-gradient(180deg, #fff 0%, var(--cyan) 55%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(0,229,255,0.5));
}
.header .sub{
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--cyan);
  opacity: 0.8;
  margin-top: 4px;
}

/* ===== 角色卡片 ===== */
.char-row{
  display: flex;
  gap: 20px;
  justify-content: center;
  padding: 20px 20px 10px;
  flex-wrap: wrap;
}

.char-card{
  width: 180px;
  background: linear-gradient(170deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.1);
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
  cursor: pointer;
  transition: all 0.25s ease-out;
  position: relative;
  overflow: hidden;
}
.char-card::before{
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(170deg, rgba(0,229,255,0.08), transparent 60%);
  opacity: 0;
  transition: opacity 0.25s;
}
.char-card:hover{
  transform: translateY(-3px);
  border-color: rgba(0,229,255,0.4);
  box-shadow: 0 8px 24px rgba(0,229,255,0.15);
}
.char-card:hover::before{ opacity: 1 }
.char-card.selected{
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,229,255,0.3), 0 8px 24px rgba(0,0,0,0.4);
  background: linear-gradient(170deg, rgba(0,229,255,0.12), rgba(255,45,149,0.04));
}

/* 角色立绘区 */
.char-visual{
  height: 170px;
  position: relative;
  display: flex; align-items: flex-end; justify-content: center;
  font-size: 56px;
  padding-bottom: 8px;
}
.char-visual .rank-badge{
  position: absolute;
  top: 8px; left: 14px;
  background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,20,40,0.7));
  border: 1px solid rgba(255,215,0,0.4);
  padding: 2px 10px;
  font-size: 10px;
  font-weight: 900;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 1px;
  clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
}
.char-visual .level-tag{
  position: absolute;
  bottom: 6px; right: 10px;
  font-size: 10px;
  font-weight: 900;
  font-style: italic;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1px;
}

/* 角色信息区 */
.char-info{
  padding: 10px 14px 14px;
  background: linear-gradient(0deg, rgba(0,0,0,0.4), transparent);
  position: relative;
}
.char-name{
  font-size: 15px;
  font-weight: 700;
  font-style: italic;
  letter-spacing: 1px;
  color: var(--white);
}
.char-epithet{
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  margin-top: 1px;
}

/* 选中高亮条 */
.char-card.selected .char-info::after{
  content: '';
  position: absolute;
  bottom: 0; left: 14px; right: 14px;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  box-shadow: 0 0 6px var(--cyan);
}

/* ===== 场景面板 ===== */
.scene-panel{
  display: none;
  max-width: 900px;
  margin: 8px auto;
  padding: 20px 24px;
}
.scene-panel.on{ display: block; animation: fadeUp 0.25s ease-out }
@keyframes fadeUp{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.scene-panel h2{
  font-size: 14px; font-weight: 700; font-style: italic;
  letter-spacing: 2px; color: var(--cyan);
  text-align: center; margin-bottom: 14px;
}

.scene-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
}

.scene-btn{
  background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.08);
  clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
  padding: 18px 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.scene-btn:hover{
  background: rgba(0,229,255,0.06);
  border-color: rgba(0,229,255,0.25);
  transform: translateY(-2px);
}
.scene-btn.selected{
  background: rgba(0,229,255,0.1);
  border-color: var(--cyan);
  box-shadow: 0 0 14px rgba(0,229,255,0.2);
}
.scene-btn .st-title{
  font-size: 14px; font-weight: 700; font-style: italic;
  color: var(--white); margin-bottom: 4px;
}
.scene-btn .st-desc{
  font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.4;
}
.scene-btn .st-badge{
  display: inline-block; margin-top: 6px;
  padding: 2px 8px; font-size: 9px; font-weight: 900; font-style: italic;
  letter-spacing: 1px;
  background: rgba(255,45,149,0.12);
  color: var(--pink);
  border: 1px solid rgba(255,45,149,0.3);
  clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
}

/* ===== 确认按钮 ===== */
.launch-wrap{
  display: none; justify-content: center; padding: 6px 0 40px;
}
.launch-wrap.on{ display: flex; animation: fadeUp 0.25s ease-out }

.launch-btn{
  font-size: 20px; font-weight: 900; font-style: italic;
  letter-spacing: 4px;
  padding: 16px 64px;
  border: none; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, var(--cyan), #0088c0 50%, var(--pink));
  clip-path: polygon(6% 0, 100% 0, 94% 100%, 0 100%);
  box-shadow: 0 0 24px rgba(0,229,255,0.3), 0 6px 20px rgba(0,0,0,0.4);
  transition: all 0.2s;
}
.launch-btn:hover{
  transform: scale(1.04);
  box-shadow: 0 0 40px rgba(0,229,255,0.5), 0 8px 28px rgba(0,0,0,0.5);
}
.launch-btn:active{ transform: scale(0.97) }

/* ===== 状态栏 ===== */
.status-bar{
  text-align: center; padding: 10px;
  font-size: 11px; font-style: italic; letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
}

/* 响应式 */
@media(max-width:640px){
  .header h1{ font-size: 26px }
  .char-row{ gap: 12px }
  .char-card{ width: 140px }
  .char-visual{ height: 130px; font-size: 40px }
  .scene-grid{ grid-template-columns: 1fr 1fr }
}
</style>
</head>
<body>

<div class="rainbow-top"></div>
<div class="rainbow-bottom"></div>

<div class="header">
  <h1>METAVERSE LOBBY</h1>
  <div class="sub">◆ SELECT YOUR DESTINY ◆</div>
</div>

<div class="char-row" id="chars"></div>

<div class="scene-panel" id="scenes">
  <h2>◆ CHOOSE SCENARIO ◆</h2>
  <div class="scene-grid" id="scene-list"></div>
</div>

<div class="launch-wrap" id="confirm">
  <button class="launch-btn" onclick="launch()">GAME START</button>
</div>

<div class="status-bar" id="status"></div>

<script>
const chars = [
  {name:'艾莉尼', epithet:'Twilight Will', emoji:'🌌', rank:'Lv.??', color:'#7c8aff', scenarios:[
    {title:'漂流者与晨风', desc:'次元裂缝中与风之战士的偶然相遇——两个孤独旅人的轨迹在此交叠。', badge:''},
    {title:'次元裂缝', desc:'时空的裂隙扩大了。每一次跳跃都可能改变一切。', badge:''},
    {title:'外传·邂逅', desc:'在异世界中与威廉和安克擦肩。一段未曾被记录的旅程。', badge:''},
    {title:'乐园遗迹', desc:'废弃的乐园中隐藏着关于她世界的秘密。她不再是旁观者。', badge:''},
    {title:'NSFW', desc:'在乐园的深夜，记忆与触感从未如此清晰。', badge:'NSFW'}
  ]},
  {name:'拔示巴', epithet:'Ashidefill', emoji:'👑', rank:'Lv.??', color:'#ff4d4d', scenarios:[
    {title:'命运之子的王座', desc:'废墟王座上，崇拜者环绕。外来者的出现打破沉默的仪式。', badge:''},
    {title:'废土流浪者', desc:'她离开了圣堂。龟裂大地上两个流亡者的道路交叉了。', badge:''},
    {title:'圣堂反叛', desc:'当圣堂成为囚笼，拔示巴的耐心到了尽头。', badge:''},
    {title:'战斗联合', desc:'面对共同的敌人，她选择了暂时的联盟。不是信任——是实用。', badge:''},
    {title:'NSFW', desc:'约定的夜晚。她的王座不需要祈祷——只需要服从。', badge:'NSFW'}
  ]},
  {name:'蕾娜', epithet:'Ishmael', emoji:'🔫', rank:'Lv.??', color:'#ff8c42', scenarios:[
    {title:'逃亡者的选择', desc:'伊欧尼亚的废墟还在冒烟。11人死了——她是第12个。', badge:''},
    {title:'伊欧尼亚的幸存者', desc:'唯一的生还者。但"生还"从来不等同于"活着"。', badge:''},
    {title:'焦土独行', desc:'大地裂成碎片。她不再指望有人跟上她的脚步。', badge:''},
    {title:'共同的敌人', desc:'仇人的名单上两个名字重叠了。试一试——不是信任，是实用。', badge:''},
    {title:'NSFW', desc:'藏身处的夜晚。枪套没有解开——但有些事比扣扳机更需要勇气。', badge:'NSFW'}
  ]},
  {name:'米姆', epithet:'Mikura', emoji:'💜', rank:'Lv.??', color:'#9b59b6', scenarios:[
    {title:'光之塔的旅伴', desc:'新世界的入口，她站在你身边。"没有受伤也可以检查一下哦——免费的！"', badge:''},
    {title:'疗伤的巫女', desc:'蘑菇林边缘，她展开绷带和古老的医术。温柔得不属于这个废墟时代。', badge:''},
    {title:'异世界的导师', desc:'古老的知识需要传递者。她选择开口，选择信任。', badge:''},
    {title:'约定的尽头', desc:'泰斯塔蒙特睁开了眼。约定的代价即将清算。', badge:''},
    {title:'NSFW', desc:'月光透过光之塔的裂窗洒下。她说这只是"另一种对话"。', badge:'NSFW'}
  ]},
  {name:'贝尔泽布特', epithet:'Velzub', emoji:'🕷️', rank:'Lv.??', color:'#00e5ff', scenarios:[
    {title:'深渊的低语', desc:'纯数据构成的深渊中，一个声音呼唤你的名字。她不是敌人——但也不是朋友。', badge:''},
    {title:'猫戏老鼠', desc:'你被困在她的数据迷宫里。每条走廊都是死路——除非她让你通过。', badge:''},
    {title:'涅墨西斯会议', desc:'混沌七器的残存者会面了。旧日的誓言，今日的重量。', badge:''},
    {title:'程序觉醒', desc:'一段无法删除的代码。一个不该存在的自我意识。', badge:''},
    {title:'NSFW', desc:'一魂双体。今晚——触碰的会是谁？感知到触碰的又会是谁？', badge:'NSFW'}
  ]}
];

let selC = -1, selS = -1;

function renderChars(){
  document.getElementById('chars').innerHTML = chars.map((c,i) => `
    <div class="char-card${i===selC?' selected':''}" onclick="pickChar(${i})">
      <div class="char-visual" style="background:radial-gradient(ellipse at 50% 120%, ${c.color}22 0%, transparent 60%)">
        <div class="rank-badge">${c.rank}</div>
        <span>${c.emoji}</span>
        <div class="level-tag">LV.??</div>
      </div>
      <div class="char-info">
        <div class="char-name">${c.name}</div>
        <div class="char-epithet">${c.epithet}</div>
      </div>
    </div>
  `).join('');
}

function pickChar(i){ selC = i; selS = -1; renderChars(); renderScenes();
  document.getElementById('scenes').classList.add('on');
  document.getElementById('confirm').classList.remove('on');
  document.getElementById('status').textContent = '';
}

function renderScenes(){
  const c = chars[selC];
  document.getElementById('scene-list').innerHTML = c.scenarios.map((s,j) => `
    <div class="scene-btn${j===selS?' selected':''}" onclick="pickScene(${j})">
      <div class="st-title">${s.title}</div>
      <div class="st-desc">${s.desc}</div>
      ${s.badge?'<div class="st-badge">'+s.badge+'</div>':''}
    </div>
  `).join('');
}

function pickScene(j){ selS = j; renderScenes();
  document.getElementById('confirm').classList.add('on');
  const c = chars[selC];
  document.getElementById('status').textContent = `◆ ${c.name} · ${c.scenarios[j].title} ◆`;
}

function launch(){
  if(selC<0||selS<0) return;
  const c = chars[selC], s = c.scenarios[selS];
  const idx = selC*5+selS+1;
  document.getElementById('status').textContent = `>> LAUNCHING: ${c.name} · ${s.title} [#${idx}] <<`;
}

renderChars();
</script>
</body>
</html>
