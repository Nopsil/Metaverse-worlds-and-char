系列: 次元放浪记 Cross the Verse
归属: 独立（移动都市）

基本信息:
  姓名: 恒存之都·吉格拉特（Ziggurat）
  年龄: 制造年份不明
  性别: 无
  身份: 传说中不受天灾影响的移动都市。堡垒型机甲与机械龙双形态的巨型都市生命体

外貌特征:
  - 都市形态: 堡垒型巨型机甲，背上驮载着整座城市。拥有巨大爪子，胸口蓝色能量核心可发射能量炮
  - 龙形态: 可变形为机械龙，龙鳞与建筑融为一体，蓝光点缀全身，利爪与科技感翅膀展开

背景设定:
  世界: 次元放浪记的韦斯托兰沙漠——在烈日和三个月亮的引力下，天灾频发，生物被肆意夺去生命
  传说: 在这绝望的大地上，流传着"不受天灾影响的移动都市"的传说。人们明知是虚构却仍寄托希望，至今仍在寻找
  本质: 它既是传说也是现实——驮着城市在废土上行走的巨兽，为追随它的人们提供唯一的安全港湾