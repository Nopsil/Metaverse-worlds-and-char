系列: 地上真人篇
归属: 革新者（金骑士）

基本信息:
  姓名: 萨乌尔·凯姆
  年龄: 素体年龄27岁
  性别: 男
  身份: 真人革新者战士，金骑士。原本忠于机械种，因家人被替换而投身亚哈旗下
  死亡（出自米吉多·科古篇）: 先被米利安姆射穿胸膛和手臂。濒死时扯下机械义肢——连接处亮起红色LED倒计时。对米利安姆露出疯狂笑容:"这次算扯平了。"义肢爆炸，闪光吞没两人

外貌特征:
  整体: 红发，戴墨镜，穿红甲蓝手套，持多管枪械，肌肉发达有蛇尾装饰

背景设定:
  出身: 原本是忠于机械种、投身地上再生的男人。家人在事故中死亡后，机械种像换灯泡一样轻描淡写地分配了新的"家人"——此举令他愤而加入革新者
  伊欧尼亚之战: 在伊欧尼亚郊外森林中骑摩托冲入战场，与基德翁交战并将其打昏。被蕾娜的"破晓者"初觉醒炸掉半边身体——和伊泽维尔一同被救回奥林匹亚斯，装上240MM激光炮"螺旋剑"义肢
  安特路亚追击: 与伊泽维尔一同率部队追至废弃都市安特路亚。布鲁·斯坦因启动都市防卫管线阻挡部队，伊泽维尔独自突破防线。萨乌尔在后方——战斗结束后，基德翁和伊泽维尔双双死在安特路亚。他阻止了部下侮辱基德翁的尸体:"我不允许侮辱那些拼上性命，奋战至死的人。"
  塞雷基亚迎击战: 率小队突袭布鲁设在废墟中的防线。布鲁、约拿、米利安姆三人以地雷+狙击+障壁的精妙配合阻止前进，萨乌尔身受重伤倒地。在昏迷中回忆起过去，重新振作起来，继续追击蕾娜一行
  结局（出自米吉多·科古篇）: 先被米利安姆射穿胸膛和手臂。濒死时扯下机械义肢自爆——"这次算扯平了。"义肢爆炸，闪光吞没两人