系列: 次元放浪记 Cross the Verse
归属: 独立旅人

基本信息:
  姓名: 林内
  年龄: 外表年龄8岁
  性别: 女
  身份: 从拉维娜实验室中诞生的实验生物，差点被当作废品处理掉的幸存者

外貌特征:
  整体: 绿发红瞳少女，戴眼镜，穿黑白大衣，戴蓝蝴蝶结
  特征: 头发上伸出几根细长的触手——这是她的感知器官，也能在需要时用于战斗。没有猫耳也没有机械配件——那些都是误读

背景设定:
  出身: 拉维娜·基顿负责的IDC研究楼中人工培育的实验用生物。在实验中被判定为"失败品"，差点被废弃处理
  能力: 头部的细长触手兼具感知与战斗功能——这是她被培育出来的核心特征
  另一面: 林内/Silent Gear（与威廉和艾莉尼前往韦斯托兰时的另一形态，着褪色衣物、持相机，无官方剧情）
  关联: 拉维娜·基顿（她的创造者）
  对应曲: 旅星に渇く