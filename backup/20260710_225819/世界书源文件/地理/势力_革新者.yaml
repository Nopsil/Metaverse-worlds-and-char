势力: 革新者 (INNOVATOR)
系列: 地上真人篇
类型: 地上真人政治军事组织

概述: 由真人组成的政治军事组织，内部分为强硬派和稳健派两个对立派系。强硬派主张以武力夺回地上、反抗机械种统治；稳健派主张与机械种和归还者共存

派系:
  强硬派: 以亚哈为领导者，认为地上应属于真人，暗中筹备对机械种的反叛。视归还种的到来为机械种重启灭绝计划的信号，对稳健派和归还者持敌对态度
  稳健派: 以伊欧尼亚殖民地为据点，欢迎归还种的到来，视之为约定的实现。与强硬派水火不容

关键成员:
  强硬派（初期/亚哈时期）: 亚哈(领袖)、伊泽维尔(士官)、萨乌尔(金骑士)
  强硬派（后期/赛罗·凯南时期）: 凯南·梅尔维亚斯(指挥官)、赛罗·达文斯(指导层)、沃特(宰相)、萨尔贡·菲尔纳斯(南方司令)、泽法·尼亚德(铜骑士)、蕾亚·艾·弗拉达(圣女)、洛特·十二(克隆实验体)、艾莉夏、艾斯特尔、纳丁、德威格
  稳健派: (据点: 伊欧尼亚殖民地、艾菲斯殖民地、佩尔修斯殖民地)

关系:
  - 两派水火不容，一触即发
  - 强硬派视稳健派为"蠢货"
  - 稳健派在圣堂前组成防卫线对抗强硬派进攻