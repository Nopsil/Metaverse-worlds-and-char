<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<style>
:root{--bg:#0a0a14;--surface:#12122a;--border:#1e1e3a;--cyan:#7c8aff;--pink:#ff7eb3;--gold:#ffd700;--text:#d0d0e8;--muted:#7070a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Microsoft YaHei',sans-serif;padding:10px 12px;font-size:12px;min-width:200px;max-width:300px;border:1px solid var(--border);border-radius:8px;margin:0}
.h{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:8px;text-align:center}
.r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.l{color:var(--muted);font-size:11px}
.v{color:var(--text);text-align:right;max-width:65%}
.bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin:2px 0}
.fill{height:100%;border-radius:2px;transition:width .4s}
.al{font-size:10px;color:var(--muted)}
.thought{margin-top:6px;padding:6px 8px;background:var(--surface);border-radius:4px;font-style:italic;color:var(--muted);font-size:11px;line-height:1.4;border-left:2px solid var(--border)}
</style></head>
<body>
<div class="h" id="zn">--</div>
<div class="r"><span class="l">好感度</span><span class="v" id="zav">0/100</span></div>
<div class="bar"><div class="fill" id="zab" style="width:0;background:var(--muted)"></div></div>
<div class="al" id="zal">陌生人</div>
<div class="r"><span class="l">心情</span><span class="v" id="zmo">--</span></div>
<div class="r"><span class="l">穿着</span><span class="v" id="zcl">--</span></div>
<div class="thought" id="zth">...</div>
<script>
(async function(){
  var $=function(id){return document.getElementById(id)};
  var t=function(id,v){var el=$(id);if(el)el.textContent=v!=null?String(v):'--'};

  function render(ch,aff,mood,cloth,thought){
    t('zn',ch||'--');
    var a=Number(aff)||0,ac,al;
    if(a>=81){ac='#ff7eb3';al='无条件信任'}
    else if(a>=61){ac='#7c8aff';al='深厚信赖'}
    else if(a>=41){ac='#4ade80';al='熟悉亲近'}
    else if(a>=21){ac='#fbbf24';al='初步信任'}
    else{ac='var(--muted)';al='陌生人'}
    $('zav').textContent=a+'/100';
    $('zab').style.width=a+'%';
    $('zab').style.background=ac;
    t('zal',al);t('zmo',mood);t('zcl',cloth);t('zth',thought||'...');
  }

  // Read character name from parent SillyTavern
  var nameMap={'airine':'艾莉尼','bathsheba':'拔示巴','lena':'蕾娜','meme':'米姆','belzeebul':'贝尔泽布特'};
  var sc='';
  try{
    var chat=window.parent.SillyTavern.getContext().chat;
    for(var i=0;i<Math.min(chat.length,5);i++){
      var m=chat[i].mes||'';
      var match=m.match(/已选择角色[：:]\s*(.+?)[，,\n]/);
      if(match){sc=match[1].trim();break}
    }
  }catch(e){}
  render(nameMap[sc]||sc||'--',0,'','','');

  // Wait for Mvu, then poll for stat_data using getVariables (TH iframe API)
  try{await waitGlobalInitialized('Mvu');}catch(e){}
  
  function readData(){
    try{
      // Primary: getVariables with type message (TH iframe API)
      var sd=null;
      if(typeof getVariables==='function'){
        var v=getVariables({type:'message',message_id:getCurrentMessageId?getCurrentMessageId():undefined});
        sd=v&&v.stat_data?v.stat_data:null;
      }
      // Fallback: scan messages via parent.Mvu
      if(!sd){
        var Mvu=window.parent.Mvu;
        if(Mvu&&typeof Mvu.getMvuData==='function'){
          var c=window.parent.SillyTavern.getContext().chat;
          for(var i=c.length-1;i>=0;i--){
            var mid=c[i].swipe_id;
            if(mid===undefined||mid===null)continue;
            var d=Mvu.getMvuData({type:'message',message_id:mid});
            if(d&&d.stat_data&&d.stat_data.selected_character){sd=d.stat_data;break}
          }
        }
      }
      if(!sd||!sd.selected_character)return false;
      sc=sd.selected_character;
      var cd=(sd.characters||{})[sc]||{};
      render(nameMap[sc]||cd.name||sc,cd.affection,cd.mood,cd.clothing,cd.inner_thought);
      return true;
    }catch(e){return false;}
  }

  if(!readData()){
    var tries=0;
    var timer=setInterval(function(){
      tries++;
      if(readData()||tries>=30)clearInterval(timer);
    },1000);
  }
})();
</script>
</body>
</html>
