<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #0a0a14; --surface: #12122a; --border: #1e1e3a;
  --cyan: #7c8aff; --pink: #ff7eb3; --gold: #ffd700;
  --text: #d0d0e8; --muted: #7070a0; --dim: #404070;
  --font: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  padding:10px 12px;font-size:12px;min-width:200px;max-width:300px;
  border:1px solid var(--border);border-radius:8px;
}
.header{
  font-size:14px;font-weight:700;color:var(--cyan);
  margin-bottom:8px;text-align:center;letter-spacing:1px;
}
.row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.label{color:var(--muted);font-size:11px}
.val{color:var(--text);text-align:right;max-width:65%;word-break:break-word}
/* Affection bar */
.aff-row{margin:4px 0}
.aff-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.aff-fill{height:100%;border-radius:2px;transition:width .4s}
.aff-label{font-size:10px;color:var(--muted);margin-top:2px}
/* Thought */
.thought{
  margin-top:6px;padding:6px 8px;background:var(--surface);
  border-radius:4px;font-style:italic;color:var(--muted);
  font-size:11px;line-height:1.4;border-left:2px solid var(--border);
}
/* Present chars */
.present{
  margin-top:6px;font-size:10px;color:var(--dim);
  text-align:center;letter-spacing:1px;
}
/* NSFW section */
.nsfw-block{margin-top:4px;display:none}
.nsfw-block.on{display:block}
.nsfw-tag{
  font-size:9px;color:var(--pink);text-align:center;margin-bottom:2px;
  letter-spacing:1px;font-weight:600;
}
/* Loading */
.loading{text-align:center;color:var(--dim);padding:8px}
</style>
</head>
<body>
<div class="loading" id="loading">loading...</div>
<div id="panel" style="display:none">
  <div class="header" id="name"></div>
  <div class="aff-row">
    <div class="row"><span class="label">好感度</span><span class="val" id="aff-val"></span></div>
    <div class="aff-bar"><div class="aff-fill" id="aff-bar"></div></div>
    <div class="aff-label" id="aff-label"></div>
  </div>
  <div class="row"><span class="label">关系</span><span class="val" id="rel"></span></div>
  <div class="row"><span class="label">心情</span><span class="val" id="mood"></span></div>
  <div class="row"><span class="label">穿着</span><span class="val" id="cloth"></span></div>
  <div class="thought" id="thought"></div>
  <div class="present" id="present"></div>
  <div class="nsfw-block" id="nsfw">
    <div class="nsfw-tag">NSFW</div>
    <div class="row"><span class="label">身体</span><span class="val" id="body"></span></div>
    <div class="row"><span class="label">衣着</span><span class="val" id="integrity"></span></div>
    <div class="row"><span class="label">姿势</span><span class="val" id="pose"></span></div>
  </div>
</div>
<script>
(async ()=>{
  try{
    await waitGlobalInitialized('Mvu');
    const vars = getVariables({type:'chat'});
    const sc = vars?.stat_data?.selected_character;
    // Fallback: try latest message if chat-level not available
    const msgVars = (!sc) ? getVariables({type:'message', message_id: 'latest'}) : null;
    const finalSc = sc || msgVars?.stat_data?.selected_character;
    if(!finalSc){ document.getElementById('loading').textContent='no character'; return; }

    const c = vars.stat_data.characters?.[finalSc] || msgVars?.stat_data?.characters?.[finalSc];
    if(!c){ document.getElementById('loading').textContent=finalSc; return; }

    // Affection
    const aff = c.affection ?? 0;
    let affColor, affLabel;
    if(aff>=81){ affColor='var(--pink)'; affLabel='无条件信任' }
    else if(aff>=61){ affColor='var(--cyan)'; affLabel='深厚信赖' }
    else if(aff>=41){ affColor='#4ade80'; affLabel='熟悉亲近' }
    else if(aff>=21){ affColor='#fbbf24'; affLabel='初步信任' }
    else { affColor='var(--dim)'; affLabel='陌生人' }

    // Basic fields
    document.getElementById('name').textContent = c.name || sc;
    document.getElementById('aff-val').textContent = aff + '/100';
    document.getElementById('aff-bar').style.width = aff + '%';
    document.getElementById('aff-bar').style.background = affColor;
    document.getElementById('aff-label').textContent = affLabel;
    document.getElementById('rel').textContent = c.relationship || '--';
    document.getElementById('mood').textContent = c.mood || '--';
    document.getElementById('cloth').textContent = c.clothing || '--';
    document.getElementById('thought').textContent = c.inner_thought || '...';

    // Present characters
    const present = vars.stat_data?.present_characters;
    if(present && present !== sc) {
      document.getElementById('present').textContent = '同行: ' + present;
    }

    // NSFW
    const body = c.body_state, integ = c.clothing_integrity, pose = c.pose;
    const hasNsfw = (body && body !== '正常') || (integ && integ !== '整齐') || (pose && pose !== '站立');
    if(hasNsfw){
      document.getElementById('nsfw').classList.add('on');
      document.getElementById('body').textContent = body || '--';
      document.getElementById('integrity').textContent = integ || '--';
      document.getElementById('pose').textContent = pose || '--';
    }

    document.getElementById('loading').style.display='none';
    document.getElementById('panel').style.display='block';
  }catch(e){
    document.getElementById('loading').textContent='error: '+e.message;
  }
})();
</script>
</body>
</html>
