<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0a14;--surface:#12122a;--border:#1e1e3a;--cyan:#7c8aff;--pink:#ff7eb3;--gold:#ffd700;--text:#d0d0e8;--muted:#7070a0;--font:'Segoe UI','Microsoft YaHei',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:10px 12px;font-size:12px;min-width:200px;max-width:300px;border:1px solid var(--border);border-radius:8px}
.h{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:8px;text-align:center}
.r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.l{color:var(--muted);font-size:11px}
.v{color:var(--text);text-align:right;max-width:65%}
.aff-row{margin:4px 0}
.bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px}
.fill{height:100%;border-radius:2px;transition:width .4s}
.al{font-size:10px;color:var(--muted);margin-top:2px}
.thought{margin-top:6px;padding:6px 8px;background:var(--surface);border-radius:4px;font-style:italic;color:var(--muted);font-size:11px;line-height:1.4;border-left:2px solid var(--border)}
.present{margin-top:6px;font-size:10px;color:var(--muted);text-align:center}
.nsfw-block{margin-top:4px;display:none}
.nsfw-block.on{display:block}
.nsfw-tag{font-size:9px;color:var(--pink);text-align:center;margin-bottom:2px;font-weight:600}
</style>
</head>
<body>
<div class="h" id="name">--</div>
<div class="aff-row">
  <div class="r"><span class="l">好感度</span><span class="v" id="aff-val">0/100</span></div>
  <div class="bar"><div class="fill" id="aff-bar" style="width:0;background:var(--muted)"></div></div>
  <div class="al" id="aff-label">陌生人</div>
</div>
<div class="r"><span class="l">关系</span><span class="v" id="rel">--</span></div>
<div class="r"><span class="l">心情</span><span class="v" id="mood">--</span></div>
<div class="r"><span class="l">穿着</span><span class="v" id="cloth">--</span></div>
<div class="thought" id="thought">...</div>
<div class="present" id="present" style="display:none"></div>
<div class="nsfw-block" id="nsfw">
  <div class="nsfw-tag">NSFW</div>
  <div class="r"><span class="l">身体</span><span class="v" id="body"></span></div>
  <div class="r"><span class="l">衣着</span><span class="v" id="integ"></span></div>
  <div class="r"><span class="l">姿势</span><span class="v" id="pose"></span></div>
</div>
<script>
// Magical_Fairy pattern: static fallback + getAllVariables + _.get
var stat_data = {};

function $(id){return document.getElementById(id)}

function t(id,val){var el=$(id);if(el)el.textContent=val!=null?String(val):'--'}

function render(){
  var sc=stat_data.selected_character||'';
  var cs=stat_data.characters||{};
  var c=cs[sc]||{};
  
  t('name',c.name||sc||'--');
  
  var aff=Number(c.affection)||0;
  var affColor,affLabel;
  if(aff>=81){affColor='var(--pink)';affLabel='无条件信任'}
  else if(aff>=61){affColor='var(--cyan)';affLabel='深厚信赖'}
  else if(aff>=41){affColor='#4ade80';affLabel='熟悉亲近'}
  else if(aff>=21){affColor='#fbbf24';affLabel='初步信任'}
  else{affColor='var(--muted)';affLabel='陌生人'}
  t('aff-val',aff+'/100');
  var bar=$('aff-bar');if(bar){bar.style.width=aff+'%';bar.style.background=affColor}
  t('aff-label',affLabel);
  t('rel',c.relationship||'--');
  t('mood',c.mood||'--');
  t('cloth',c.clothing||'--');
  t('thought',c.inner_thought||'...');
  
  var pres=stat_data.present_characters;
  var pel=$('present');
  if(pres&&pres!==sc){pel.textContent='同行: '+pres;pel.style.display='block'}
  
  var hasNsfw=(c.body_state&&c.body_state!=='正常')||(c.clothing_integrity&&c.clothing_integrity!=='整齐')||(c.pose&&c.pose!=='站立');
  if(hasNsfw){
    $('nsfw').classList.add('on');
    t('body',c.body_state);t('integ',c.clothing_integrity);t('pose',c.pose);
  }
}

function getStatData(){
  if(typeof getAllVariables==='function'){
    try{
      var all=getAllVariables();
      if(all&&all.stat_data&&typeof all.stat_data==='object') stat_data=all.stat_data;
    }catch(e){}
  }
  return stat_data;
}

getStatData();
render();
</script>
</body>
</html>
