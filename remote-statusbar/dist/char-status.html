<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #0a0a14; --surface: #12122a; --border: #1e1e3a;
  --cyan: #7c8aff; --pink: #ff7eb3; --gold: #ffd700;
  --text: #d0d0e8; --muted: #7070a0;
  --font: 'Segoe UI','Microsoft YaHei',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  padding:10px 12px;font-size:12px;min-width:200px;max-width:300px;
  border:1px solid var(--border);border-radius:8px;
}
.header{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:8px;text-align:center}
.row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.label{color:var(--muted);font-size:11px}
.val{color:var(--text);text-align:right;max-width:65%}
.aff-row{margin:4px 0}
.aff-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px}
.aff-fill{height:100%;border-radius:2px;transition:width .4s}
.aff-label{font-size:10px;color:var(--muted);margin-top:2px}
.thought{margin-top:6px;padding:6px 8px;background:var(--surface);border-radius:4px;font-style:italic;color:var(--muted);font-size:11px;line-height:1.4;border-left:2px solid var(--border)}
.present{margin-top:6px;font-size:10px;color:var(--muted);text-align:center}
.nsfw-block{margin-top:4px;display:none}
.nsfw-block.on{display:block}
.nsfw-tag{font-size:9px;color:var(--pink);text-align:center;margin-bottom:2px;font-weight:600}
.debug{font-size:9px;color:var(--pink);margin-top:4px;text-align:center;display:none}
.debug.on{display:block}
</style>
</head>
<body>
<div class="header" id="name">loading...</div>
<div class="debug" id="debug"></div>
<div id="panel" style="display:none">
  <div class="aff-row">
    <div class="row"><span class="label">好感度</span><span class="val" id="aff-val"></span></div>
    <div class="aff-bar"><div class="aff-fill" id="aff-bar"></div></div>
    <div class="aff-label" id="aff-label"></div>
  </div>
  <div class="row"><span class="label">关系</span><span class="val" id="rel"></span></div>
  <div class="row"><span class="label">心情</span><span class="val" id="mood"></span></div>
  <div class="row"><span class="label">穿着</span><span class="val" id="cloth"></span></div>
  <div class="thought" id="thought"></div>
  <div class="present" id="present"></div>
  <div class="nsfw-block" id="nsfw">
    <div class="nsfw-tag">NSFW</div>
    <div class="row"><span class="label">身体</span><span class="val" id="body"></span></div>
    <div class="row"><span class="label">衣着</span><span class="val" id="integrity"></span></div>
    <div class="row"><span class="label">姿势</span><span class="val" id="pose"></span></div>
  </div>
</div>
<script>
(async ()=>{
  const d=document.getElementById('debug');
  function log(msg){d.textContent+=(d.textContent?' | ':'')+msg;d.classList.add('on')}

  try{
    // Try multiple approaches to get variables
    let c=null, sc=null, allVars=null;

    // Approach 1: chat-level
    try{
      const v=getVariables({type:'chat'});
      allVars=v; sc=allVars?.stat_data?.selected_character;
      c=allVars?.stat_data?.characters?.[sc];
      log('chat:'+(sc||'null'));
    }catch(e){log('chat_err')}

    // Approach 2: latest message
    if(!sc) try{
      const v=getVariables({type:'message',message_id:'latest'});
      allVars=v; sc=allVars?.stat_data?.selected_character;
      c=allVars?.stat_data?.characters?.[sc];
      log('msg:'+(sc||'null'));
    }catch(e){log('msg_err')}

    // Approach 3: Mvu direct
    if(!sc) try{
      await waitGlobalInitialized('Mvu');
      const mvuData=Mvu.getMvuData({type:'message',message_id:'latest'});
      allVars=mvuData; sc=allVars?.stat_data?.selected_character;
      c=allVars?.stat_data?.characters?.[sc];
      log('mvu:'+(sc||'null'));
    }catch(e){log('mvu_err')}

    if(!sc){log('no_char');return}

    // Render
    document.getElementById('name').textContent=c?.name||sc;
    const aff=c?.affection??0;
    let affColor,affLabel;
    if(aff>=81){affColor='var(--pink)';affLabel='无条件信任'}
    else if(aff>=61){affColor='var(--cyan)';affLabel='深厚信赖'}
    else if(aff>=41){affColor='#4ade80';affLabel='熟悉亲近'}
    else if(aff>=21){affColor='#fbbf24';affLabel='初步信任'}
    else{affColor='var(--muted)';affLabel='陌生人'}
    document.getElementById('aff-val').textContent=aff+'/100';
    document.getElementById('aff-bar').style.width=aff+'%';
    document.getElementById('aff-bar').style.background=affColor;
    document.getElementById('aff-label').textContent=affLabel;
    document.getElementById('rel').textContent=c?.relationship||'--';
    document.getElementById('mood').textContent=c?.mood||'--';
    document.getElementById('cloth').textContent=c?.clothing||'--';
    document.getElementById('thought').textContent=c?.inner_thought||'...';
    const pres=allVars?.stat_data?.present_characters;
    if(pres&&pres!==sc)document.getElementById('present').textContent='同行: '+pres;
    if(c?.body_state&&c.body_state!=='正常'||c?.clothing_integrity&&c.clothing_integrity!=='整齐'||c?.pose&&c.pose!=='站立'){
      document.getElementById('nsfw').classList.add('on');
      document.getElementById('body').textContent=c?.body_state||'--';
      document.getElementById('integrity').textContent=c?.clothing_integrity||'--';
      document.getElementById('pose').textContent=c?.pose||'--';
    }
    document.getElementById('panel').style.display='block';
  }catch(e){log('err:'+e.message)}
})();
</script>
</body>
</html>
