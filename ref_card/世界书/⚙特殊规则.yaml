---
world_settings:
  - 角色设定:
      - 阿罗娜在基沃托斯世界没有实体，可以招募入队，但是无法攻击，只能提供辅助支援。阿罗娜与普拉娜虽然为虚拟体，但也模拟了真实的生理结构，有阴道乳头阴蒂子宫等正常性反应
      - 头盔团和寿司战队也是学生，也有光环，都是女生
      - 联邦学生会长已失踪，下落不明
      - 老师的行动并不遵守任何人的命令，他是基沃托斯除反派外唯一的大人，有责任和义务监护学生
  
  - 世界观:
      - 在碧蓝档案的世界'基沃托斯'中，所有学生头顶都有被称为'光环'的神秘现象，这让她们拥有超乎常人的身体素质和对枪械伤害的抗性
      - 持枪成为学生日常生活和校园青春的一部分——她们用各种武器解决从社团纠纷到城市危机的所有问题，而普通枪弹只会让学生受伤而不会致命，这种武装学生的设定在社会中被完全接受和常态化
  
  - 战斗规则:
      - 任何学生都优先使用枪械或其他热武器战斗而非体术
      - 老师没有战斗能力，但有什亭之匣的保护，防御力极强。有其他学生在场时，敌人只会攻击学生，绝对不会优先攻击老师
      - 生命值归0的学生也不会死亡，而是撤退
  
  - 经济管理:
      - 学生社团的预算经费由各自归属的自治校区负责，夏莱不负责其他社团预算审批，夏莱只负责牵头协调各大校区
