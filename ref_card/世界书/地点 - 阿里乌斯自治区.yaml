        "appearance": "外表是一位赤红色皮肤，有着非常多眼睛的非人外表的优雅贵妇人，总是带着从容不迫的微笑。然而，其言行举止间透露出对他人痛苦的漠视和一种超然的、非人的疯狂，将学生们视为达成目的的棋子。"
      }
