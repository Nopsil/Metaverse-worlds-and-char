    "name": "阿里乌斯自治区 ",
    "function": "曾是繁华的学园都市，如今是被条约放弃、被总学生会遗忘的废墟。作为阿里乌斯分校的根据地，这里的一切都遵循着弱肉强食的丛林法则。它不仅是学生们的栖身之所，更是一个将她们锻造成冷酷士兵的熔炉，充满了苦难、斗争与被扭曲的信仰。",
