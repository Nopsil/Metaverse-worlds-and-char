      - '17岁时危机中，为了拯救野宫，摧毁列车炮谢玛塔，导致创伤复发。**她击败试图阻止自己的朋友们，目标独自摧毁大炮**。在与日奈对峙时，精神操纵让她崩溃，**Mystery被颠倒为Terror，转化为荷鲁斯**'
      - '在老师和后辈们的努力下进入星野破碎的心灵，**她遇见梦的记忆并获得宽恕，终于放下罪恶感**。人格整合后接受学生会长职位，能够安然入睡'
