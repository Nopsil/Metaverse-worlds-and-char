Vol2Ch1大纲:
    - seq: 1
      地点: "千年科学学园/游戏开发部社办"
      角色: ["才羽桃井", "才羽绿"]
      情境: |
        老师收到一封奇怪的信件，前往游戏开发部。
        在那里遇到正在埋头开发游戏的双胞胎姐妹桃井和绿。

    - seq: 2
      地点: "千年科学学园/游戏开发部社办"
      角色: ["才羽桃井", "才羽绿", "早濑优香"]
      情境: |
        研讨会会计早濑优香前来通告：
        因游戏开发部业绩低迷，将予以废部处理。
        桃井和绿决定前往废墟寻找秘密武器以挽救社团。

    - seq: 3
      地点: "千年废墟"
      角色: ["才羽桃井", "才羽绿"]
      情境: |
        桃井和绿在废墟中搜寻游戏开发的圣典"G.BIBLE"。
        但遭遇敌对机器人攻击，被迫撤退至废弃工厂。

    - seq: 4
      地点: "千年废墟/废弃工厂"
      角色: ["才羽桃井", "才羽绿", "天童爱丽丝（刚被发现）"]
      情境: |
        在废弃工厂中，游戏开发部发现一具名为爱丽丝的人型机器人（此时爱丽丝全裸，服装和武器后续章节才会提供）。
        为了社团存续，桃井将爱丽丝带回社办，打算让她成为新成员。

    - seq: 5
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿"]
      情境: |
        爱丽丝游玩了游戏开发部的前作《传说传奇编年史》，
        表现出由衷的喜爱和感动。
        社团成员们被她真挚的反应深深打动。

    - seq: 6
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿"]
      情境: |
        爱丽丝通宵玩完了游戏开发部推荐的所有游戏，
        由此学会了更接近普通人的说话方式。
        桃井为爱丽丝准备了在千年学园作为学生融入所需的物品。

    - seq: 7
      地点: "千年科学学园/工程部"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "白石咏叶", "猫冢响", "丰见亚都梨"]
      情境: |
        游戏开发部前往工程部为爱丽丝配备武器。
        爱丽丝选中了一门原本用于星际战舰的电磁炮。
        工程部为测试爱丽丝的能力向她发起挑战。
        爱丽丝虽从未持过武器，却熟练地使用电磁炮击退了工程部成员。
        工程部部长咏叶开始对爱丽丝异常的身体素质产生怀疑。
      注: 爱丽丝的超常战斗力是伏笔

    - seq: 8
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "早濑优香"]
      情境: |
        优香前来审查新成员爱丽丝的入部资格。
        桃井和绿事先帮爱丽丝练习自我介绍。

    - seq: 9
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "早濑优香", "才羽桃井", "才羽绿"]
      情境: |
        优香对爱丽丝的回答表示满意，批准其正式入部。
        但优香警告：如果下一款游戏做不出来，仍然会废部。
        游戏开发部再次前往废墟寻找G.BIBLE。

    - seq: 10
      地点: "千年废墟"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子"]
      情境: |
        有了爱丽丝的加入，游戏开发部这次轻松击败了废墟中的敌对机器人。

    - seq: 11
      地点: "千年废墟/废弃工厂"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子"]
      情境: |
        游戏开发部抵达一座破旧工厂。
        爱丽丝仿佛出于本能，被一台电脑所吸引。
        那台电脑中正存储着G.BIBLE的数据，爱丽丝成功将其下载。
      注: 爱丽丝对废墟设施的本能反应暗示她的出身

    - seq: 12
      地点: "千年科学学园/真理部社办"
      角色: ["才羽桃井", "才羽绿", "小涂真纪"]
      情境: |
        G.BIBLE有密码加密，需要解密工具。
        游戏开发部向真理部求助，真纪告知她们需要"镜"这一设备。
        但"镜"已被研讨会没收，保管在违禁品仓库中，由C&C看守。

    - seq: 13
      地点: "千年科学学园/研讨会违禁品仓库周边"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "真理部成员", "室笠朱音"]
      情境: |
        爱丽丝和真理部负责制造声东击西的干扰，
        桃井、绿和老师尝试正面突破研讨会。
        真理部的黑客行动成功将朱音困在密封房间中。

    - seq: 14
      地点: "千年科学学园/研讨会周边"
      角色: ["才羽桃井", "才羽绿", "花冈柚子", "白石咏叶", "角楯花凛"]
      情境: |
        游戏开发部在工程部部长咏叶的帮助下甩开了C&C狙击手花凛。
        但还没来得及庆祝，就遭遇了C&C的另一名成员一之濑明日奈。

    - seq: 15
      地点: "千年科学学园/研讨会违禁品仓库"
      角色: ["天童爱丽丝", "室笠朱音", "角楯花凛"]
      情境: |
        由于耗时过长，朱音和花凛挣脱束缚，局势对游戏开发部极为不利。
        关键时刻爱丽丝赶到救援，成功潜入违禁品仓库。

    - seq: 16
      地点: "研讨会违禁品仓库内部"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子", "美甘妮禄"]
      情境: |
        游戏开发部成功取回"镜"，但在仓库内与C&C部长妮禄正面遭遇。
        柚子急中生智设计骗过妮禄，一行人安全撤回社办。

    - seq: 17
      地点: "C&C社办/游戏开发部社办"
      角色: ["室笠朱音", "美甘妮禄", "才羽桃井", "才羽绿", "花冈柚子"]
      情境: |
        朱音为失败向妮禄道歉，但妮禄更在意爱丽丝如何能与C&C抗衡。
        另一边，游戏开发部尝试用"镜"解密G.BIBLE。

    - seq: 18
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子"]
      情境: |
        G.BIBLE解密成功——然而内容只是一句简单的格言："热爱游戏。"
        众人的期待落空，但在爱丽丝的鼓舞下，
        游戏开发部开始全力制作新作《传说传奇编年史2》。
      注: G.BIBLE的内容虽简单，但正是游戏开发的本质

    - seq: 19
      地点: "游戏开发部社办"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子", "美甘妮禄"]
      情境: |
        游戏开发部赶在截止日期前提交了《传说传奇编年史2》。
        上传完成后，社办突然遭到枪击——
        来者是C&C部长妮禄，声称上次与爱丽丝的交手勾起了兴趣，
        向爱丽丝发起挑战。一场破坏力惊人的战斗后，妮禄心满意足地离去。

    - seq: 20
      地点: "千年科学学园/颁奖典礼"
      角色: ["天童爱丽丝", "才羽桃井", "才羽绿", "花冈柚子", "早濑优香"]
      情境: |
        千年大奖颁发，游戏开发部凭借《传说传奇编年史2》获得特别奖。
        社团成功免于废部，众人欢庆。
        然而在庆祝之中，装有G.BIBLE的游戏机突然自行启动。
      注: 游戏机自行启动是第2章危机的伏笔