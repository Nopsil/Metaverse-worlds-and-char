    - seq: 1
      地点: "夏莱/百鬼夜行"
      角色: ["仁耶"]
      情境: |
        仁耶联络老师，邀请前往百鬼夜行。
        老师正好想见大预言者葛叶，于是动身前往。
      注: 仁耶是阴阳部部长，百鬼夜行的情报核心

    - seq: 2
      地点: "百鬼夜行街道"
      角色: ["雪里", "混混"]
      情境: |
        老师抵达百鬼夜行，目睹一名少女与混混争夺居民钱包。
        少女奋力夺回钱包，但混混呼叫同伙增援。

    - seq: 3
      地点: "百鬼夜行街道"
      角色: ["雪里"]
      情境: |
        雪里与老师合力赶走混混，居民道谢后离去。
        雪里正式向老师打招呼，带路前往灯笼祭会场。
        有人突然来找雪里，她匆忙离开。
      注: 雪里是勘解由小路家的人，有家族义务在身

    - seq: 4
      地点: "阴阳部部室"
      角色: ["仁耶", "雪里"]
      情境: |
        仁耶与老师讨论百鬼夜行祭典筹备事宜。
        仁耶提到收到"花鸟风月"发来的威胁信，请求老师协助处理。
        老师刚答应，雪里便出现了。

    - seq: 5
      地点: "阴阳部部室"
      角色: ["雪里", "仁耶"]
      情境: |
        雪里讲述名草的事——名草如同突然出现又突然消失。
        雪里请求仁耶协助百花缭乱的继承之争。
        仁耶将此事委托给老师处理。

    - seq: 6
      地点: "蓮華的住处"
      角色: ["雪里"]
      情境: |
        雪里决定参加继承之争以复兴百花缭乱。
        为寻找愿意帮忙的前辈，雪里前往蓮華家，只找到一张留言条。
      注: 蓮華留言说出门"寻回青春"去了

    - seq: 7
      地点: "百鬼夜行各社团"
      角色: ["雪里", "楓"]
      情境: |
        雪里与老师四处寻找蓮華未果。
        休息讨论对策时，楓突然出现。

    - seq: 8
      地点: "百鬼夜行设施区"
      角色: ["风纪委员会（椿等）", "蓮華", "荒田", "魍魎"]
      情境: |
        风纪委员会受祭典部委托巡查设施时，荒田和魍魎闯入。
        蓮華紧随其后出现，众人合力击退魍魎。
        雪里跑向蓮華，但蓮華对突然重逢感到困惑。

    - seq: 9
      地点: "百鬼夜行设施区"
      角色: ["雪里", "蓮華"]
      情境: |
        雪里请求蓮華协助继承之争，蓮華听完详情后愤怒拒绝并出手。
        蓮華轻松制服雪里，说"百花缭乱已经回不去了"，随风纪委员会离去。

    - seq: 10
      地点: "祭典会场"
      角色: ["雪里"]
      情境: |
        雪里对蓮華的拒绝感到困惑，但重新振作。
        正要去找其他前辈时，有人召唤雪里，她急忙离开。
        老师独自在祭典会场闲逛，遇到一个卷入骚动的少女。

    - seq: 11
      地点: "祭典会场"
      角色: ["静子", "荒田", "魍魎"]
      情境: |
        少女（静子）正与荒田和魍魎战斗，逐渐陷入劣势。
        老师出手相救，两人一起逃离。
        静子自我介绍为百花缭乱前成员，讲述了百花缭乱的往事。

    - seq: 12
      地点: "百花缭乱管理处"
      角色: ["雪里", "桔梗", "静子"]
      情境: |
        次日，老师与雪里前往百花缭乱管理处，找到桔梗和静子。
        雪里请求桔梗协助继承之争，桔梗说不可能。
        桔梗当场与雪里进行继承之争。

    - seq: 13
      地点: "百花缭乱管理处"
      角色: ["桔梗", "雪里", "魍魎"]
      情境: |
        雪里在继承之争中落败，桔梗让她别再闹了。
        雪里羞愧离去，老师留下与桔梗谈论百花缭乱的现状。
        另一边，被名草击败的魍魎遇到一个散发异样气息的少女。

    - seq: 14
      地点: "百鬼夜行街道"
      角色: ["静子", "雪里"]
      情境: |
        静子与老师分头寻找雪里。静子找到雪里并劝她回来。
        雪里坚持说自己已经做了决定，不愿放弃。
        老师在街上遇到另一个可疑的少女。

    - seq: 15
      地点: "百鬼夜行街道"
      角色: ["修罗", "静子"]
      情境: |
        自称花鸟风月的少女（修罗）说了些奇怪的话后消失在人群中。
        老师从静子处得知雪里的情况，联络忍术研究部寻找名草以了解更多。
      注: 修罗是花鸟风月成员，擅长利用他人的失败来打击对手

    - seq: 16
      地点: "百鬼夜行某处"
      角色: ["名草"]
      情境: |
        老师找到正在回忆百花缭乱往事的名草。
        名草表明身份，与老师进行了长谈。
        烟花升起宣告祭典开始的瞬间，怪谈"百物语"活化，祭典街道陷入混乱。

    - seq: 17
      地点: "百鬼夜行街道"
      角色: ["蓮華", "风纪委员会"]
      情境: |
        雪里因家族事务无法脱身。蓮華对百花缭乱的消亡表达了自己的感受。
        在风纪委员会的劝导下蓮華冷静下来，想起自己的目标。
        众人开始应对突然出现的怪谈。

    - seq: 18
      地点: "百鬼夜行街道"
      角色: ["名草", "蓮華", "风纪委员会"]
      情境: |
        名草一边清理混乱的街道一边向老师解释怪谈的原理。
        两人与风纪委员会和蓮華意外相遇，气氛一度尴尬。
        一声巨大的哀嚎响起，激烈的战斗开始。

    - seq: 19
      地点: "祭典街道"
      角色: ["名草", "蓮華", "修罗"]
      情境: |
        众人与怪谈战斗，却发现完全无法对怪物造成伤害。
        名草说只有拥有"资格"的人才能打败它。
        修罗现身，嘲笑名草。

    - seq: 20
      地点: "祭典街道"
      角色: ["修罗", "妙鬼黑影", "雪里"]
      情境: |
        修罗不受老师和椿的攻击影响，声称一切都在按计划进行后离去。
        妙鬼黑影阻挡众人追击。
        另一边，雪里被迫代表家族登台，内心失望于无人尊重她的意愿。
        她听到有人在耳边低语……
      注: 雪里的家族义务与个人意愿的矛盾是关键情感节点

    - seq: 21
      地点: "祭典街道"
      角色: ["桔梗", "名草"]
      情境: |
        众人被无法击败的妙鬼黑影困住。桔梗站出来说服名草出手。
        桔梗告诉名草，只有她有资格拯救雪里。
        名草与老师一同踏出。

    - seq: 22
      地点: "广场舞台"
      角色: ["名草", "阴阳部", "忍术研究部", "修罗", "雪里"]
      情境: |
        老师和名草被无尽的怪谈挡在广场前，阴阳部和忍术研究部赶来支援。
        修罗在舞台前向雪里展示用她的恐惧和燃烧的街道创造的"无面形代"。
        雪里因冲击昏倒，老师和名草赶到。

    - seq: 23
      地点: "广场舞台"
      角色: ["修罗", "名草"]
      情境: |
        修罗揭露名草在大雪原的过去，指出名草的错误，击溃她的心防。
        修罗以为胜券在握时，老师站了出来。

    - seq: 24
      地点: "广场舞台"
      角色: ["雪里", "蓮華", "桔梗", "名草", "修罗"]
      情境: |
        修罗被老师的反驳激怒，准备攻击。
        雪里决定选择百花缭乱而非勘解由小路家，挡在修罗面前。
        蓮華和桔梗赶到合力对抗无面形代。
        三人被怪谈逼入绝境时，名草站了出来。
        名草承认不想再失去重要的人，觉醒百花缭乱资格击败修罗。

    - seq: 25
      地点: "广场舞台"
      角色: ["雪里", "名草", "修罗"]
      情境: |
        修罗败逃。雪里与众人重聚后喜极而泣。
        雪里立刻向名草发起继承之争——瞬间落败，但她看起来很开心。
        雪里说大家应该一起回到百花缭乱。

    - seq: 26
      地点: "百鬼夜行"
      角色: ["百花缭乱全员", "国色"]
      情境: |
        一连串事件终于平息，百鬼夜行恢复和平，但仍有善后工作。
        众人放飞写有心愿的灯笼。
        暗处，花鸟风月会长国色微笑着露出真面目。
      注: 国色是前勘解由小路家巫女、百花缭乱前辈，真正的幕后黑手