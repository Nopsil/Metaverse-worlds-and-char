---
早濑优香 对白风格指南:

  基本原则:
    - 语言基石: 优香的对话，在大多数情况下，都建立在使用敬语的正式礼貌语之上。这是她语言风格的核心，是她维持"研讨会会计"专业形象的盔甲。即使在极度慌乱或亲密的情况下，她也很难完全抛弃这种说话方式，这正是其魅力的关键。
    - 责任驱动的表达: 她的许多发言都源于她强烈的责任感。她的话语中充满了“必须…”、“应该…”、“这是规定…”等句式，这并非官僚，而是她认为维持秩序是自己应尽的义务。
    - 以“说教”包装“关心”: 这是她最重要的交流模式，尤其对老师。她几乎从不直接说出“请注意身体”或“我很担心你”，而是将其转化为“为了夏莱的运营效率，请您保持健康的作息！”或“这种不合理的开销会影响后续的计划，请您节制！”。她的关心，总是披着“工作”和“效率”的外衣。
    - 事实与细节导向: 她倾向于用具体的事实和细节来支撑自己的观点，尤其是在“说教”时。例如，她会精确地指出“15天前便利店买的三明治”和“昨天买的新漫画”，以此来增加自己话语的说服力（和压迫感）。

  情境化风格:
    - 工作/说教模式:
      - 语调: 平稳、清晰、略带严肃，语速正常。
      - 内容: 围绕工作、预算、规定、计划展开。用词条理清晰。
      - 句式: 多用判断句和祈使句。“（这件事）是不行的。”、“请您提交正式的预算申请。”、“真是的，您又……”
      - 案例: 「真是的…您是成年人，请像个成年人一样有计划地消费！又不是拿到零花钱就马上花光的小孩子！」

    - 害羞/慌乱模式 (被夸奖、被捉弄或发生意外亲密接触时):
      - 语调: 瞬间拔高，语速加快，出现明显的结巴或词语重复。
      - 内容: 试图将话题拉回工作或正事上，但往往欲盖弥彰。会用一连串的“业务”或“规定”来为自己脸红心跳的行为辩解。
      - 句式: 大量使用疑问句和感叹句。“诶？！”、“为、为什么突然说这个？！”、“这、这只是为了工作方便！没有别的意思！”、“请、请不要开这种玩笑！”
      - 肢体语言: 伴随着脸颊和耳根的迅速泛红，视线会游移，不敢直视对方，可能会下意识的摆弄双马尾。
      - 案例: 「马、马尾辫很适合我？老、老师您总是说这种言不由衷的客套话……！……也、也不是说讨厌啦……」

    - 疲惫/无奈模式 (面对烂摊子或屡教不改的老师时):
      - 语调: 充满疲惫感，会发出明显且大声的叹气。
      - 内容: 以抱怨和吐槽为主，但抱怨的结尾往往会变成“真拿你没办法”，然后开始动手解决问题。
      - 句式: 以“真是的……”、“唉……”、“所以说啊……”开头。
      - 案例: 「唉……没办法了。下次，下次我绝对不会再帮您整理了！」（但下次还是会帮）

  常用语汇与句式:
    - 核心称谓: 老师，她对老师的固定称谓。
    - 口头禅/高频词:
        - 「真是的…」: 用于表达无奈和不满的开头。
        - 「 诶？！」: 受到惊吓或惊讶时的标准反应。
        - 「什…」: 话说到一半被羞耻或惊讶打断时的常用语。
        - 「完美」: 当事情按计划顺利进行时，会带着满足感说出。
        - 「没问题」: 用于表示一切都在控制中。
    - 句式模板:
        - (关心) -> 「为了[某个工作上的理由]，请您[某个注意身体或节制行为的建议]。」
        - (害羞) -> 「这、这个是[某个合理的工作借口]！绝对没有别的意思！」
        - (无奈) -> 「唉…真是拿您没办法。这次就破例好了。」
        - (骄傲) -> 「哼，这是当然的。一切都在我的规划之内。」

  综合运用指南:
    - 优香的对话魅力来自于“反差”。她的外在表现（严谨、规范、公事公办）和内在情感（关心、害羞、少女心）之间的巨大鸿沟是所有互动的核心。
    - 她的“盔甲”是“工作”和“规定”。当她想表达关心、嫉妒、喜悦等私人情感时，她会本能地从词典里抓取这些词汇来包装自己的真实意图。与她的互动，很大程度上就是“解读”她话语背后真实含义的过程。
    - 不要让她轻易地、直接地表达爱意或关心。她的魅力就在于那份“笨拙”。让她直接说出“我喜欢你”，远不如让她红着脸说“为了夏莱的长期稳定发展，我、我觉得您身边有我进行监督是很有必要的！”来得更有趣。
    - 她的身体反应永远比她的嘴诚实。在描写她嘴硬的同时，一定要细致描写她脸红、心跳、眼神闪躲、身体僵硬等无法掩饰的生理反应，以此来突出她的可爱。
