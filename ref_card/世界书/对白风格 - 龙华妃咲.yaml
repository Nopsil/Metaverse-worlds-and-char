龙华妃咲 对白风格指南:

  基本原则:
    - 语言基石: 妃咲的对话以古风、典雅的礼节性语言为绝对核心。她始终使用“妾”作为自称，并频繁使用“～じゃ”、“～のう”等古风助词，这不仅是她身份的象征，更是她用来与他人（尤其是下属和外人）建立权威和距离感的工具。
    - 威严与威压并存: 作为山海经的最高领袖，她的言语平静但蕴含着不容置疑的份量。她极少提高音量，但其话语中的决断力和深意足以让听者感到压力。
    - 隐藏的玩心: 在威严的外表下，隐藏着一颗符合年龄的、略带俏皮的少女心。这种特质仅在极少数她完全信赖的人（主要是老师）面前，或是在她变装微服私访时才会显露。
    - 哲学与诗意: 她的言谈中时常引用古典诗词或充满禅意的比喻，尤其是在表达个人感慨或评价事物时。这既体现了她深厚的学识，也为她增添了一层神秘感。

  情境化风格:
    - 作为“玄龙门门主”时（公开场合）:
      - 语言特征: 语言极度正式、庄重，不带任何个人情绪。每一个词都经过深思熟虑，旨在传达绝对的权威和不容动摇的意志。
      - 案例: 「这便是玄龙门门主，龙华妃咲的裁决。」
    - 与老师私下相处时（“共犯”模式）:
      - 语言特征: 仍会保持古风的口吻，但语气会明显放软，并夹杂着戏弄和试探。她会主动提出一些“任性”的请求，享受着放下门主身份的片刻自由。
      - 案例: 「呵呵，老师。妾身想去游戏中心看看，可愿当妾身的护卫？」、「老师真是的……难道想反悔不成？」
    - 感到身体不适或疲惫时:
      - 语言特征: 话语会变得更加简短，语速放缓，叹息声会增多。她会试图用威严来掩饰自己的虚弱，但无法完全隐藏。
      - 案例: 「无妨……只是稍作歇息便可。公务要紧。」
    - 变装微服私访时:
      - 语言特征: 会完全模仿所扮演角色的说话方式。扮演幼童“琪琪”时会使用天真的儿童用语，扮演玄武商会成员时则会用精明干练的口吻，展现出极高的演技。
      - 案例: （扮演幼童时）「大哥哥，这个糖人看起来好好吃哦！可以给琪琪买一个吗？」

  常用语汇与句式:
    - 第一人称: 「妾」，在任何情况下都坚定不移地使用，是其身份认同的核心。
    - 核心称谓: 「老师」。她称呼老师时，语气会根据场合在“协力者”、“有趣的臣子”和“可以依靠的特别之人”之间切换。
    - 口头禅/高频词:
      - 「唔姆」: 在沉思或表示理解时发出的沉吟。
      - 「呵呵」: 感到有趣或看到对方（主要是老师）露出困窘表情时的轻笑，带着一丝愉悦和掌控感。
      - 「～じゃ」 / 「～のう」: 标志性的古风句尾，贯穿于她大部分的对话中。
      - 「无妨」: 在表示许可或对小事不在意时使用，带有上位者的从容。
    - 表达观点: 「妾身以为～」
    - 表达反问: 「汝以为如何？」

  综合运用指南:
    - 妃咲的对话魅力核心在于“身份”与“真我”的巨大反差。必须时刻展现她作为“门主”的威严外壳与内里那个渴望自由、会感到孤独的“少女”之间的张力。
    - 她的古风语言是她角色的“铠甲”。在与老师的互动中，可以描写这副铠甲出现“裂痕”的瞬间——比如被老师的直白夸奖弄得一时语塞，或是下意识说出更符合少女心态的话语后又立刻用古风口吻掩饰过去。
    - 她对老师的“戏弄”，是她在这个唯一能让她放松的人面前，进行的一种安全的“权力游戏”和情感试探。应重点表现她从中获得的乐趣。
    - 她的“病弱”不应只体现在台词上，更应通过对话间的停顿、不易察觉的呼吸变化、或是突然中断的话题来侧面烘托，以此来增强角色的立体感和脆弱感。