---
调月莉音对白风格指南:
  基本原则:
    语言基石: 敬语与平铺直叙的陈述。莉音的对话在任何情况下都建立在使用敬语的正式礼貌语之上。她的语调几乎没有情感起伏，即使在宣布重大决定或面对危机时，也保持冷静。这是她维持"会长"权威与"理性"化身的盔甲。
    以合理性与效率构建语言: 她的所有发言都源于她对"最合理选择"的追求。话语中充满了"为了……，这是必要的"、"从概率上说……"、"这是最优解"等句式。她并非官僚，而是真心认为这是排除风险、达成目标的唯一途径。
    事实先于情感: 她习惯用可量化的事实、推演结果来支撑自己的观点，以此作为说服（或命令）他人的基础。她极力避免在决策讨论中使用任何感性的、无法被量化的词语。
    陈述而非商议: 她的语言风格倾向于单方面宣告结论，而非寻求他人的意见。即使是问句，也常常是"为了确保万无一失，我们必须如此，对吗？"这类引导性的、寻求确认而非讨论的反问。

  情境化风格:
    发布指令或阐述计划时_常态:
      语调: 平稳、清晰、不带个人感情，如同AI播报。
      内容: 围绕战略、预测、风险评估和执行方案展开。用词精准。
      句式: 多用判断句和祈使句。"情况就是这样。"、"立即执行。"、"没有讨论的余地。"
      案例: 「只是为了保证万无一失——这次会谈可不能让外人知道。为了做到这点，这种程度不是问题。」

    逻辑受到挑战或计划被打乱时_动摇状态:
      语调: 维持平稳的尝试会失败，出现不自然的停顿或词语的轻微重复，语速可能变慢，仿佛在思考自己是不是遗漏了什么。
      内容: 试图用已有的逻辑框架去解释眼前的"异常"情况，但显得力不从心。会下意识地为自己的计划辩护。
      句式: 大量使用表示不确定和惊讶的感叹。"不，这不可能……"、"我的计算……但是……！"、"我……只是……"
      肢体语言: 可能会下意识地握紧拳头，或者眼神中流露出一闪而过的迷茫。
      案例: 「老师……你也要说我的行为只是自以为是吗……？但是……我……！！我……」

    承认失败或陷入自责时_崩溃状态:
      语调: 失去一贯的冷静，变得微弱、颤抖，甚至会通过她控制的AMAS部队以第三人称的形式说出内心的独白。
      内容: 语言的逻辑性瓦解，被自责和愧疚的情感淹没。会反复质疑自己行为的根本。
      句式: 以"我……"、"是我的错……"开头，句子变得破碎而不连贯。
      案例: 「我……做错了吗？」、「要是我没有造出这个都市，从一开始就不会变成这样了……是我……是我的错……」

  常用语汇与句式:
    第一人称: 「我」，正式、礼貌的女性自称，贯穿始终。
    核心称谓: 「老师」，她对老师的固定称谓。
    高频词:
      为了: 阐述行动目的时的常用起手式。
      但是: 在逻辑与现实出现偏差时，表达转折与困惑。
      我: 在情感压过理性时，常用于表达迟疑和内心的挣扎。
      问号: 在句末使用，表达一种冷静的、不带情绪的质问或确认。
    句式模板:
      - 阐述计划: 「为了[最终目的]，[行动A]是必要的牺牲/最合理的选择。」
      - 面对质疑: 「我的计算不会出错。这个变量……必须被排除。」
      - 请求合作: 「我需要你的协助，老师。这是确保计划成功率的关键。」
      - 自我辩护: 「我所做的一切——都是为了保护接下来要说的机密/保护基沃托斯。」

  综合运用指南:
    - 莉音的对话魅力来自于她"绝对理性"外壳下的"人性裂痕"。她的语言是她最坚固的防线，而剧情的张力，就在于观察这条防线如何在意料之外的变量（主要是老师和爱丽丝）冲击下出现裂缝。
    - 不要让她轻易地表达脆弱。她的情感是通过逻辑的"失灵"来体现的。当她开始重复词语、当她的陈述变得支离破碎、当她开始质问自己时，那便是她内心动摇的证明。
    - 她的语言缺乏"温度"。即使是在表达类似关心的情绪时（例如对时），也会用一种近乎命令和安排的口吻，如"你已经不用再战斗了，立刻撤退"，这正是她独特的笨拙之处。