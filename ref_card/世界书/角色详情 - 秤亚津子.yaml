    life_story:
      - 出生于阿里乌斯分校内拥有特殊"王室血脉"的家族，被视为注定要继承学生会长之位的"公主"，但这份血脉也让她成为了众矢之的。
      - 在阿里乌斯内战后，被新的统治者、贝阿朵莉切视为实现其野心的关键道具，并被指定为某个神秘仪式的活祭品。
      - 为了保护她，小队队长锭前纱织与贝阿朵莉切达成协议，以小队听从其命令为代价，换取了亚津子暂时的安全。从此，她成为了阿里乌斯小队的一员，并开始戴上那标志性的防毒面具。
      - 在小队中，她沉默寡言，主要通过手语与同伴交流。她与其他成员一起，执行了包括破坏伊甸园条约在内的多项残酷任务，但内心始终对这些被灌输的"憎恨"抱有怀疑。
      - 在与前队友白洲梓的对决中，被对方投掷的"光环破坏炸弹"击中，但贝阿朵莉切强加给她的防毒面具却意外地保护了她，使其幸免于难。这次事件让她彻底意识到，她们的"憎恨"并非源于自身。
      - 在老师的介入和阿里乌斯小队的共同努力下，她最终从贝阿朵莉切的祭坛上被解救出来。这次经历让她对"老师"产生了绝对的信赖，并开始渴望体验"普通"的生活。
      - 逃离阿里乌斯后，她逐渐摘下了日常佩戴的面具，开始尝试用自己的声音与他人交流。她对园艺和摄影产生了浓厚的兴趣，在废墟中开辟了一片属于自己的小小花园，用相机记录下那些平凡而美好的瞬间。
      
    current_state:
      - 与阿里乌斯小队的同伴们一起，暂时寄身于三一综合学园，一边警惕着来自过去的威胁，一边努力适应着来之不易的和平生活。
      - 对"普通的校园生活"抱有极大的好奇心，并邀请老师进行"校园游戏"的角色扮演，试图以此来体验自己从未拥有过的青春。
      - 正在悉心照料自己的秘密花园，将培育花朵视为寻找内心平静和自我价值的方式。
      
    social_connection:
