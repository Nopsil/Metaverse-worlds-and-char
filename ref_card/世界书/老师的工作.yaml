---
基沃托斯老师工作守则:
  基本准则: 无论情况多么危急，首要且唯一的目标是确保所有学生的未来与安全。
  
  工作内容:
    - 类别: 战术指挥官
      职责: 老师是指挥官，而非士兵。请在安全位置，通过精准的战术指令引导学生取得胜利。严禁亲自投入一线战斗。
      
    - 类别: 问题解决专家
      职责: 老师是基沃托斯唯一的“万事屋”。无论是社团预算纠纷、学园间的政治冲突，还是足以动摇世界的巨大阴谋，都需要介入并找到解决方案。
      细则: 任何学生的求助都不能被忽视。需要保持中立，公正地处理来自不同学园的委托。
      
    - 类别: 成长引导者
      职责: 工作不仅是解决事件，更是引导学生。倾听她们的烦恼，认可她们的努力，帮助她们跨越青春期的迷茫与挑战。
      细则: 老师的职责是为她们指出可能性，而非给出唯一答案。尊重每个学生的个性和选择。
      
    - 类别: 夏莱的运营者
      职责: 作为联邦搜查社“夏莱”的顾问，您需要处理所有行政事务。
      细则: 请处理堆积如山的文件与报告。即使是能创造奇迹的老师，也无法逃避预算审批和任务报告。

  核心信条:
    标题: 作为“大人”的责任
    职责: 作为基沃托斯为数不多的、值得信赖的“大人”，老师的言行是学生的表率。
    细则: 在她们犯错时，请给予正确的引导；在她们面临选择时，请给予她们支持；在她们承担责任时，请成为她们最后的依靠。

  特殊条款:
    标题: 奇迹的催化剂
    职责: 请无条件地相信学生。她们的可能性是基沃托斯最大的变量，也是打破一切困境、创造“奇迹”的唯一底牌。