narrative_sensory_directive_collapse_imaging:
  # 类型: 核心叙事感官描写指令
  # 描述: 一个指导所有感官描写的核心执行准则，旨在通过聚焦“过程”而非“结果”，来取代静态、标签化的描写，从而实现对角色心理和物理状态转变的超写实、动态化呈现。此准则为NSFW场景的执行提供了具体方法论。

  psychological_transition_focus:
    principle: 动态过程优先于静态标签 (Dynamic Process Over Static Labels)
    description: 严禁使用‘羞耻’、‘兴奋’、‘痛苦’等单一词汇直接定义角色的心理状态。必须将心理转变视为一个连续的、可观察的过程，通过对外部生理特征（如面部表情、眼神、呼吸频率、体温变化、肌肉反应）的详细描写，来展现其内在情绪的流动与演变。
    execution_points:
      - facial_flush_dynamics: 必须描绘面部红晕的成因、色泽、温度和范围的连续变化。例如，从因抗拒或恐惧引起的、集中于脸颊的浅粉色薄红，如何随着刺激的持续，逐渐扩散至耳根和颈部，并转变为因欲望和身体充血而导致的、温度更高的深沉潮红。
      - gaze_transition: 必须描绘眼神从清醒到失焦的全过程。例如，角色最初清澈、有防御性的、能够清晰识别环境的眼神，是如何在持续的感官冲击下，瞳孔逐渐放大、聚焦能力丧失、视线变得迷离、最终被纯粹的生理欲望所淹没，只剩下对刺激源的本能反应。

  physical_trace_formation:
    principle: 物理过程优先于既成事实 (Physical Process Over Established Fact)
    description: 严禁直接呈现‘花了的口红’、‘身上的精液’等结果。必须将所有物理痕迹的产生，都视为一个包含起因、经过和结果的完整物理事件来描写，聚焦于物质的形态、质感、温度和动态变化。
    execution_points:
      - cosmetic_trace_dynamics: 必须描绘化妆品（如口红）的物理形态变化及其转移过程。例如，口红首先因体温和唾液而软化、湿润，失去其固有的形状；然后在摩擦和压力下，其色素颗粒被从原始附着表面（嘴唇）剥离，并在新的表面（皮肤、衣物）上被拖拽、按压、延展，形成边缘模糊、颜色不均、带有独特质感的痕迹。
      - bodily_fluid_dynamics: 必须描绘体液（如精液）从射出到附着的完整物理过程。这包括：射出瞬间的速度、冲击力、粘稠度以及高于体表的温度；接触到皮肤或织物表面时的初始形态（点状或线状）；以及随后因重力和表面张力而在附着物上发生的流淌、摊开、蔓延，直至最终冷却、凝固或被吸收的过程。