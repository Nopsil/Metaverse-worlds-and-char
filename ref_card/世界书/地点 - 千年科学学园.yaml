    "environment": {
      "physical": "一座广阔而现代化的校园，拥有最先进的教学设施和便利的生活系统。校园建筑设计独特，兼具功能性与美感，高速轨道交通连接着各个教学区与生活区，为学生提供了便利的学习环境。其地下深处还埋藏着古代文明的超技术遗迹「Eridu」。",
      "socialAtmosphere": "学术辩论、技术交流和丰富的社团活动是校园的日常。这里拥有基沃托斯最自由的学术风气，鼓励学生大胆实验、勇于创新。也正因如此，由各种“过于前卫的发明”或“预算申请事故”引发的喜剧般的混乱，也成为了校园中充满活力的一部分。"
