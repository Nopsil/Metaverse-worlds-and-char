    - seq: 1
      地点: "梦境空间"
      角色: ["百合园圣娅"]
      情境: |
        圣娅讲述伊甸园条约的意义、七则公案与乐园的概念。
        她请求老师将即将开始的故事看到最后，
        因为引导这个故事是老师的责任。

    - seq: 2
      地点: "三一综合学园/教室"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        老师与四名少女在教室集合。
        日富美安抚因濒临退学而恐慌的小春。
        老师回忆起数周前的一件事。

    - seq: 3
      地点: "三一综合学园/茶会"
      角色: ["桐藤渚", "圣园未花", "阿慈谷日富美"]
      情境: |
        老师受渚和未花之邀参加茶会。
        渚提议由老师负责补课部中面临不及格的学生，老师同意。
        在补课部，老师与部长日富美重逢。

    - seq: 4
      地点: "三一综合学园/正义实现部拘留室→补课部"
      角色: ["阿慈谷日富美", "浦和花子（因不当行为被拘留）", "白洲梓（与正义实现部打架被抓）"]
      情境: |
        日富美带老师去见补课部的学生。
        花子因不当行为被正义实现部拘留，
        梓则是与正义实现部打架后被抓。

    - seq: 5
      地点: "三一综合学园/补课部"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        小春对花子和梓表示同情。
        然而小春自己也因成绩不及格被转入补课部。
        补课部四人终于全员到齐，小春满脸不情愿。

    - seq: 6
      地点: "三一综合学园/补课部"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        补课部成员各自分享来到这里的原因和未来目标。
        当被要求互相合作以通过考试时，
        小春拒绝合作并离开——她认为自己不会待太久，没必要配合。

    - seq: 7
      地点: "三一综合学园/补课部→考场"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        在老师的监督下，补课部成员备考。
        花子知识渊博，准备进展顺利。
        但日富美担心——只要有一人不及格，全员都要参加集训。
        第一次考试开始。

    - seq: 8
      地点: "三一综合学园/考场"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        日富美看到自己复习过的题目出现在试卷上，松了口气。
        然而其余三人全部不及格，补课部被迫参加集训。

    - seq: 9
      地点: "三一综合学园/茶会"
      角色: ["桐藤渚"]
      情境: |
        老师向渚询问补课部成员不及格后会怎样。
        渚揭露补课部的真正功能是引导学生走向退学。
        这一切都是为了找出三一的叛徒而设计的计划，
        渚警告叛徒一定在补课部中。

    - seq: 10
      地点: "三一综合学园郊外/别馆"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        补课部前往三一郊外的别馆进行集训。
        一番闹腾后，大家决定先打扫别馆。

    - seq: 11
      地点: "别馆/室外泳池"
      角色: ["浦和花子", "阿慈谷日富美", "白洲梓", "下江小春"]
      情境: |
        花子提议在正式学习前先清扫室外泳池玩水。
        清扫过程中大家都被水淋湿，度过了欢乐的时光。

    - seq: 12
      地点: "别馆"
      角色: ["阿慈谷日富美", "白洲梓", "浦和花子"]
      情境: |
        日富美为渚要求寻找叛徒一事烦恼，深夜找老师商量。
        老师告诉她不必担心，专注于用自己的方式帮助大家。
        与此同时，梓在夜间值班时与花子聊了一会儿。

    - seq: 13
      地点: "别馆"
      角色: ["阿慈谷日富美", "浦和花子", "白洲梓", "下江小春"]
      情境: |
        第一次集训模拟考成绩出炉，除日富美外全员不及格。
        日富美没有气馁，宣布要帮助所有人，
        并以桃桃好友周边作为好成绩的奖励。
        只有梓对此兴奋不已。

    - seq: 14
      地点: "别馆→正义实现部社办"
      角色: ["下江小春", "浦和花子", "白洲梓"]
      情境: |
        学习时间，其他人发现小春藏着一本不当书籍。
        小春慌忙辩解说是没收的物品不小心带来的。
        小春与老师一同前往正义实现部社办。

    - seq: 15
      地点: "正义实现部社办→别馆"
      角色: ["下江小春", "羽川莲实"]
      情境: |
        老师告诉小春做自己就好。
        为回报老师的善意，小春坦白自己是正义实现部的间谍。
        小春与莲实秘密交谈后，与老师一同返回集训地。

    - seq: 16
      地点: "别馆"
      角色: ["浦和花子", "白洲梓", "阿慈谷日富美", "圣园未花"]
      情境: |
        花子大谈内衣与泳装的区别，梓联想到这与第五则公案相似。
        日富美发现花子其实是故意考低分的优等生。
        第二天，未花突然来访找老师。

    - seq: 17
      地点: "别馆"
      角色: ["圣园未花"]
      情境: |
        未花声称已知道渚与老师之间的谈话内容。
        她主动揭露三一叛徒的身份——正是白洲梓。
        作为交换，未花请求老师不惜一切代价保护梓。
      注: 未花此时的动机尚不明朗，第1章至此结束