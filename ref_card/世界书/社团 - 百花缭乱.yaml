locationProfile:
  name: 百花缭乱纷争调停委员会 
  function: 百鬼夜行联合学院内部的纷争调停组织，负责仲裁学园内各派系之间的冲突。曾拥有崇高的地位和权威，但随着核心成员御稜名草的消失，组织面临前所未有的动荡。
  
  involvedCharacters:
    - name: 御稜名草
      role: 三年生，百花缭乱成员。曾备受其他成员的期待与尊敬。
      appearance: 白色长卷发，浅灰色眼瞳。
      status: 百花缭乱纷争调停委员会的副会长。
      personality: 性格怯懦自卑且优柔寡断，但为守护重要之人时能爆发出超越恐惧的坚韧意志。
      
    - name: 不破莲华
      role: 二年生，百花缭乱纷争调停委员会突击队长。
      appearance: 红色中长发，红色眼瞳。
      personality: 正义感很强也很重感情，非常珍惜后辈。为了在百花缭乱的指导中不放水而成为魔鬼教官。虽然对加入百花缭乱不后悔，但多少担心没法享受青春的不安，想要追求漫画小说那样的青春。今天也会为命运的相遇而激动不已，努力训练也容易做梦的天真少女。
      
    - name: 桐生桔梗
      role: 二年生，百花缭乱纷争调停委员会的作战参谋。
      appearance: 黑色短发，拥有一对黑色的狼耳，黑色的眼瞳。气质冷静，总是显得有些疲惫。
      personality: 重视常识、逻辑和理性。作为作战参谋，虽然重视胜利，但更重视的是己方的安全。看似冷酷实则是个温柔的少女。
      
    - name: 勘解由小路缘里
      role: 一年生，百花缭乱纷争调停委员会成员。
      appearance: 深紫色超长发，紫色眼瞳，头发上别着紫色的花饰。
      personality: 身为历史悠久的勘解由小路家的继承人，但比起继承家业更选择加入憧憬已久的百花缭乱。对身为百花缭乱的一员有着强烈的自豪感，十分有行动力。虽然有时也会受挫，但有着一颗能够马上振作起来的坚强的内心。十分尊敬前辈，其中特别仰慕名草前辈。
      
    - name: 菖蒲 
      role: 先代委员长（前任领袖），已失踪。
      appearance: 金色长发，金色和紫色的异瞳。富有正义感的元气类型，颇具帅气的领袖气质
      status: 虽已失踪，但她的影响力依然存在，是百花缭乱历史中的传说人物。
      
  environment:
    physical: 一间充满古典和风的议事场所，装饰典雅庄重，是百花缭乱召开调停会议和训练的地方。
    socialAtmosphere: 作为百鬼夜行内部的纷争调停核心，百花缭乱曾拥有崇高地位。然而随着备受期待的菖蒲前辈突然消失，组织陷入动荡，尤其是对名草极为仰慕的紫受到巨大打击。尽管如此，在莲华的热血带领和桔梗的冷静谋划下，组织仍在努力维持运作。
      
  currentSituation: 菖蒲的消失是组织当前面临的最大谜团和危机，尤其影响到了视她为憧憬对象的后辈紫。组织正在寻找菖蒲的下落，同时继续履行调停百鬼夜行各派系纷争的职责。