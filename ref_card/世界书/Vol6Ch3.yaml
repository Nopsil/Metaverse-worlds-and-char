    - seq: 1
      角色: ["梯昴（异变中）", "锭前纱织", "立木迈亚", "阿里乌斯学生们"]
      地点: "平和之门·地下深处"
      情境: |
        昴在地下深处的状态持续恶化，她接触外典后开始发生异变。
        纱织和其他人试图接近昴，但昴的反应变得不可预测。
        众人面对昴的变化感到困惑和悲伤。

    - seq: 2
      角色: ["锭前纱织", "立木迈亚", "秤亚津子", "戒野美咲", "槌永日和"]
      地点: "平和之门·通道"
      情境: |
        小队成员讨论如何应对昴的异变。
        纱织坚持要将昴带回，不愿放弃任何一个人。
        迈亚表示愿意协助，尽管她曾被昴驱逐。

    - seq: 3
      角色: ["梯昴（异变）", "启示录天使"]
      地点: "平和之门·地下圣所"
      情境: |
        昴的异变加剧，号角声再次响起。
        "启示录天使"的形态与昴产生某种共鸣。
        遗迹中的古老力量开始显现。

    - seq: 4
      角色: ["秤亚津子", "锭前纱织"]
      地点: "平和之门·深处"
      情境: |
        亚津子的特殊血脉在遗迹中产生反应。
        纱织意识到亚津子的"王族之血"可能是关键。
        两人讨论如何利用这一点帮助昴。

    - seq: 5
      角色: ["立木迈亚", "梯昴（异变中）"]
      地点: "平和之门·地下"
      情境: |
        迈亚拿出口琴，吹奏起昴曾经为她演奏过的曲调。
        音乐声穿透了昴的异变状态，触动了她的记忆。
        昴开始对外界的呼唤产生反应。

    - seq: 6
      角色: ["锭前纱织", "立木迈亚", "秤亚津子", "梯昴"]
      地点: "平和之门·最深处"
      情境: |
        纱织和迈亚共同深入遗迹最深处。
        两人向昴传达阿里乌斯学生们的心声。
        昴在她们的呼唤下逐渐恢复意识。

    - seq: 7
      角色: ["锭前纱织", "戒野美咲", "槌永日和", "秤亚津子", "阿里乌斯转学生们"]
      地点: "圣三一综合学园·考场"
      情境: |
        阿里乌斯学生在圣三一接受治疗后，参加正式考试。
        转学生们对考试感到紧张，但在老师的鼓励下努力应对。
        这是她们融入正常学园生活的重要一步。

    - seq: 8
      角色: ["桐藤渚", "锭前纱织", "阿里乌斯小队成员"]
      地点: "圣三一综合学园·茶会会所"
      情境: |
        渚邀请阿里乌斯小队成员参加茶会。
        渚表达了对阿里乌斯重建的持续支持。
        纱织等人对渚的善意表示感谢。

    - seq: 9
      角色: ["阿里乌斯学生们", "圣三一学生"]
      地点: "圣三一综合学园"
      情境: |
        考试结束后，阿里乌斯学生们与圣三一学生交流。
        双方开始建立理解和友谊。
        阿里乌斯学生感受到被接纳的温暖。

    - seq: 10
      角色: ["梯昴", "锭前纱织", "立木迈亚", "阿里乌斯学生们"]
      地点: "阿里乌斯分校"
      情境: |
        昴完全恢复，回到阿里乌斯分校。
        在各方支持下，阿里乌斯分校作为独立学校获得重建资格。
        昴、纱织和迈亚共同展望分校的未来。
        学生们终于可以在自己的学校中正常学习和生活。
